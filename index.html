<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Продуктивность</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #3C3489; --accent-light: #EEEDFE;
  --teal: #1D9E75; --teal-light: #E1F5EE;
  --amber-light: #FAEEDA; --coral-light: #FAECE7;
  --bg: #F7F7F5; --bg2: #FFFFFF; --bg3: #EFEFEB;
  --text: #1a1a18; --text2: #888780; --text3: #BBBBBB;
  --border: #E8E8E4; --radius: 14px;
}
html, body { height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:15px; -webkit-font-smoothing:antialiased; overflow:hidden; }
#app { height:100vh; display:flex; flex-direction:column; }
#screens { flex:1; overflow:hidden; position:relative; }
.screen { position:absolute; top:0;left:0;right:0;bottom:0; overflow-y:auto; display:none; flex-direction:column; padding-bottom:20px; }
.screen.active { display:flex; }
#nav { display:flex; background:var(--bg2); border-top:1px solid var(--border); padding:8px 0 12px; flex-shrink:0; }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; background:none; border:none; cursor:pointer; padding:4px 0; font-family:inherit; }
.nav-btn .ico { font-size:24px; line-height:1; }
.nav-btn .lbl { font-size:10px; color:var(--text2); }
.nav-btn.active .lbl { color:var(--accent); font-weight:600; }
.hdr { padding:16px 16px 10px; background:var(--bg); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:5; }
.hdr-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.hdr-title { font-size:20px; font-weight:700; color:var(--text); }
.hdr-btn { background:var(--bg3); border:none; border-radius:8px; padding:6px 12px; font-size:13px; color:var(--text2); cursor:pointer; font-family:inherit; }
.filters { display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; }
.filters::-webkit-scrollbar { display:none; }
.fbtn { white-space:nowrap; flex-shrink:0; border:1px solid var(--border); background:transparent; border-radius:99px; padding:5px 12px; font-size:13px; color:var(--text2); cursor:pointer; font-family:inherit; }
.fbtn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.lst { padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:13px 14px; cursor:pointer; }
.card:active { opacity:0.75; }
.card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
.card-title { font-size:14px; font-weight:600; color:var(--text); margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-body { font-size:13px; color:var(--text2); line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.card-date { font-size:11px; color:var(--text3); }
.note-swipe-wrap { position:relative; border-radius:var(--radius); overflow:hidden; margin-bottom:0; }
.note-swipe-bg { position:absolute; inset:0; display:flex; border-radius:var(--radius); }
.note-swipe-left { flex:1; background:#FCEBEB; display:flex; align-items:center; padding-left:16px; font-size:13px; color:#A32D2D; font-weight:600; }
.note-swipe-right { flex:1; background:var(--teal-light); display:flex; align-items:center; justify-content:flex-end; padding-right:16px; font-size:13px; color:#085041; font-weight:600; }
.note-swipe-wrap .card { margin-bottom:0; transform:translateX(0); transition:transform .15s; will-change:transform; }
.tag { font-size:11px; font-weight:600; padding:2px 9px; border-radius:99px; background:var(--accent-light); color:#26215C; }
.empty { text-align:center; padding:48px 20px; color:var(--text3); }
.empty .eico { font-size:40px; margin-bottom:8px; }
.empty .etxt { font-size:14px; line-height:1.5; }

/* HOME */
.greeting { padding:18px 16px 0; }
.gname { font-size:20px; font-weight:700; color:var(--text); }
.gdate { font-size:13px; color:var(--text2); margin-top:2px; }
.stats { padding:12px 14px 0; }
.stat-widget { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:16px; display:flex; align-items:center; gap:16px; }
.stat-main { display:flex; flex-direction:column; align-items:center; justify-content:center; padding-right:16px; border-right:1px solid var(--border); min-width:72px; }
.stat-main-n { font-size:52px; font-weight:700; color:var(--accent); line-height:1; }
.stat-main-l { font-size:12px; color:var(--text2); margin-top:4px; text-align:center; }
.stat-list { flex:1; display:flex; flex-direction:column; gap:9px; }
.stat-row { display:flex; align-items:center; justify-content:space-between; }
.stat-row-l { font-size:13px; color:var(--text2); }
.stat-row-n { font-size:15px; font-weight:700; color:var(--text); }
.sec-lbl { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; padding:14px 16px 4px; }
.titem { display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); cursor:pointer; }
.titem:last-child { border-bottom:none; }
.tchk { width:20px; height:20px; border-radius:6px; border:1.5px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; color:#fff; margin-top:1px; }
.tchk.done { background:var(--teal); border-color:var(--teal); }
.ttxt { font-size:14px; color:var(--text); flex:1; }
.ttxt.done { text-decoration:line-through; color:var(--text3); }
.pbar { height:3px; background:var(--bg3); border-radius:99px; margin-top:8px; overflow:hidden; }
.pfill { height:100%; border-radius:99px; background:var(--teal); }

/* CALENDAR */
.cal-nav { display:flex; align-items:center; justify-content:space-between; padding:10px 16px 4px; }
.cal-lbl { font-size:14px; font-weight:700; color:var(--text); }
.cal-arr { background:var(--bg3); border:none; border-radius:8px; width:28px; height:28px; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text); }
.cal-wds { display:grid; grid-template-columns:repeat(7,1fr); padding:0 8px; }
.cal-wd { text-align:center; font-size:10px; font-weight:600; color:var(--text2); padding:2px 0; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); padding:0 8px 4px; gap:1px; }
.cal-cell { aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:12px; border-radius:7px; cursor:pointer; color:var(--text2); position:relative; }
.cal-cell.today { background:var(--accent); color:#fff; font-weight:700; }
.cal-cell.sel:not(.today) { background:var(--accent-light); color:var(--accent); font-weight:600; }
.cal-cell.dot::after { content:''; position:absolute; bottom:2px; left:50%; transform:translateX(-50%); width:3px; height:3px; border-radius:50%; background:var(--teal); }
.cal-day-hdr { display:flex; align-items:center; justify-content:space-between; padding:6px 14px 2px; }
.cal-dlbl { font-size:13px; font-weight:600; color:var(--text2); }
.cal-day-btns { display:flex; gap:6px; }

/* TASK COLORS */
.tc-purple { border-left:3px solid #7F77DD; }
.tc-teal   { border-left:3px solid #1D9E75; }
.tc-coral  { border-left:3px solid #D85A30; }
.tc-amber  { border-left:3px solid #BA7517; }
.tc-blue   { border-left:3px solid #378ADD; }
.tc-pink   { border-left:3px solid #D4537E; }
.tc-gray   { border-left:3px solid #888780; }
.TASK_COLORS { display:none; }

/* TASK CARD */
.task-card { border-radius:var(--radius); padding:10px 14px; position:relative; overflow:hidden; touch-action:pan-y; }
.task-card.done-card .tc-title { text-decoration:line-through; opacity:0.55; }
.task-card.done-card { opacity:0.7; }
.tc-row { display:flex; align-items:flex-start; gap:10px; }
.tc-check { width:20px; height:20px; border-radius:6px; border:1.5px solid rgba(255,255,255,0.6); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; color:#fff; margin-top:2px; cursor:pointer; background:rgba(255,255,255,0.15); }
.tc-check.done { background:rgba(255,255,255,0.5); border-color:rgba(255,255,255,0.8); }
.tc-body { flex:1; min-width:0; }
.tc-title { font-size:14px; font-weight:600; color:#fff; }
.tc-meta { font-size:11px; color:rgba(255,255,255,0.75); margin-top:2px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.tc-desc { font-size:13px; color:rgba(255,255,255,0.8); margin-top:4px; line-height:1.4; }
.tc-note-link { font-size:11px; color:rgba(255,255,255,0.9); margin-top:3px; }

/* SWIPE */
.task-swipe-wrap { position:relative; margin-bottom:6px; border-radius:var(--radius); overflow:hidden; }
.task-swipe-bg { position:absolute; inset:0; display:flex; align-items:stretch; border-radius:var(--radius); }
.swipe-left-bg { flex:1; background:#FCEBEB; display:flex; align-items:center; padding-left:16px; font-size:13px; color:#A32D2D; font-weight:600; }
.swipe-right-bg { flex:1; background:var(--teal-light); display:flex; align-items:center; justify-content:flex-end; padding-right:16px; font-size:13px; color:#085041; font-weight:600; }
.task-card { margin-bottom:0; transform:translateX(0); transition:transform .15s; will-change:transform; }

/* ALLDAY */
.allday-lbl { font-size:10px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; padding:6px 14px 0; }

/* COLOR PICKER */
.color-pick { display:flex; gap:8px; flex-wrap:wrap; }
.cpick { width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cpick.on { border-color:var(--text); transform:scale(1.15); }

/* TIME INPUT ROW */
.time-row { display:flex; gap:8px; }
.time-row input { flex:1; }

/* MEDIA */
.mrow { display:flex; gap:12px; align-items:center; }
.mcover { width:44px; height:44px; border-radius:10px; background:var(--bg3); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.minfo { flex:1; min-width:0; }
.mtitle { font-size:14px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.msub { font-size:12px; color:var(--text2); margin-top:1px; }

/* FAB */
#fab { position:fixed; bottom:76px; left:50%; transform:translateX(-50%); width:calc(100% - 28px); max-width:452px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); padding:14px; font-size:15px; font-weight:600; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; box-shadow:0 4px 18px rgba(60,52,137,.28); z-index:30; }
#fab.hide { display:none; }

/* OVERLAY */
#overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:100; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .18s; }
#overlay.on { opacity:1; pointer-events:all; }
#sheet { background:var(--bg2); border-radius:20px 20px 0 0; padding:14px 16px 36px; width:100%; transform:translateY(24px); transition:transform .2s; max-height:92vh; overflow-y:auto; }
#overlay.on #sheet { transform:translateY(0); }
.s-handle { width:34px; height:4px; background:var(--border); border-radius:99px; margin:0 auto 14px; }
.s-title { font-size:16px; font-weight:700; color:var(--text); margin-bottom:14px; }
.fld { margin-bottom:12px; }
.fld-lbl { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
input[type=text], input[type=date], input[type=time] { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:11px 12px; font-size:15px; font-family:inherit; color:var(--text); outline:none; -webkit-appearance:none; }
input:focus { border-color:var(--accent); }
.brow { display:flex; gap:8px; margin-top:14px; }
.bcnl { flex:1; background:var(--bg3); border:none; border-radius:10px; padding:13px; font-size:15px; font-family:inherit; color:var(--text2); cursor:pointer; }
.bsave { flex:2; background:var(--accent); border:none; border-radius:10px; padding:13px; font-size:15px; font-weight:600; font-family:inherit; color:#fff; cursor:pointer; }
.bdanger { background:#FCEBEB; border:none; border-radius:10px; padding:13px; font-size:15px; font-family:inherit; color:#A32D2D; cursor:pointer; }

/* DETAIL VIEW */
#detail { position:fixed; inset:0; background:var(--bg); z-index:50; display:flex; flex-direction:column; transform:translateX(100%); transition:transform .22s; }
#detail.on { transform:translateX(0); }
.d-hdr { display:flex; align-items:center; gap:10px; padding:12px 14px; border-bottom:1px solid var(--border); flex-shrink:0; }
.d-back { background:var(--bg3); border:none; border-radius:8px; width:36px; height:36px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text); }
.d-edit { background:none; border:1px solid var(--border); border-radius:8px; padding:6px 12px; font-size:13px; font-family:inherit; color:var(--text2); cursor:pointer; }
.d-body { flex:1; overflow-y:auto; padding:20px 16px; }
.d-title { font-size:20px; font-weight:700; color:var(--text); margin-bottom:4px; line-height:1.25; }
.d-date { font-size:13px; color:var(--text3); margin-bottom:16px; }
/* Rendered markdown */
.d-text { font-size:15px; line-height:1.75; color:var(--text); }
.d-text h1 { font-size:20px; font-weight:700; margin:12px 0 6px; }
.d-text h2 { font-size:17px; font-weight:700; margin:10px 0 4px; }
.d-text strong { font-weight:700; }
.d-text em { font-style:italic; }
.d-text ul { padding-left:18px; margin:6px 0; }
.d-text ol { padding-left:18px; margin:6px 0; }
.d-text li { margin:3px 0; }
.d-text hr { border:none; border-top:1px solid var(--border); margin:12px 0; }
.d-text blockquote { border-left:3px solid var(--accent); padding-left:12px; color:var(--text2); margin:8px 0; }

/* THEME MANAGER */
.theme-list { display:flex; flex-direction:column; gap:6px; margin-bottom:4px; }
.theme-row { display:flex; align-items:center; gap:8px; background:var(--bg3); border-radius:10px; padding:10px 12px; }
.theme-ico { font-size:20px; width:28px; text-align:center; flex-shrink:0; }
.theme-name { flex:1; font-size:14px; font-weight:600; color:var(--text); }
.theme-actions { display:flex; gap:6px; }
.theme-act-btn { background:none; border:1px solid var(--border); border-radius:7px; padding:4px 10px; font-size:12px; font-family:inherit; color:var(--text2); cursor:pointer; }
.theme-act-btn.del { color:#A32D2D; border-color:#F7C1C1; background:#FCEBEB; }
.trow { display:flex; gap:6px; flex-wrap:wrap; }
.topt { border:1px solid var(--border); border-radius:99px; padding:6px 12px; font-size:13px; font-family:inherit; cursor:pointer; background:transparent; color:var(--text2); }
.topt.on { background:var(--accent-light); border-color:var(--accent); color:#26215C; }
.emoji-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-top:6px; }
.emoji-opt { font-size:22px; text-align:center; padding:6px 0; border-radius:8px; cursor:pointer; border:2px solid transparent; }
.emoji-opt.on { border-color:var(--accent); background:var(--accent-light); }

/* NOTE EDITOR */
.fmt-bar { display:flex; gap:4px; margin-bottom:8px; flex-wrap:wrap; }
.fmt-btn { background:var(--bg3); border:1px solid var(--border); border-radius:6px; min-width:32px; height:32px; padding:0 8px; font-size:13px; cursor:pointer; font-family:inherit; color:var(--text); display:flex; align-items:center; justify-content:center; }
.fmt-btn:active { background:var(--accent-light); border-color:var(--accent); }
.note-ta-wrap { position:relative; border-radius:10px; }
.note-ta {
  width:100%;
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px 12px;
  font-size:15px;
  font-family:inherit;
  color:var(--text);
  outline:none;
  resize:none;
  -webkit-appearance:none;
  min-height:200px;
  line-height:24px;
  background-color:var(--bg3);
  background-image:repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 23px,
    #D8D8D4 23px,
    #D8D8D4 24px
  );
  background-size:100% 24px;
  background-position:0 8px;
  background-attachment:local;
}
.note-ta:focus { border-color:var(--accent); }
.note-ta-bg { display:none; }
.note-ta-lines { display:none; }

/* STICKER BOARD */
.sticker-tab-row { display:flex; gap:8px; margin-bottom:12px; }
.sticker-tab { flex:1; padding:9px; border:1px solid var(--border); border-radius:10px; background:transparent; font-family:inherit; font-size:13px; color:var(--text2); cursor:pointer; text-align:center; }
.sticker-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }
.board-wrap { position:relative; width:100%; height:420px; background:var(--bg3); border-radius:12px; overflow:hidden; border:1px solid var(--border); touch-action:none; }
.sticker { position:absolute; width:140px; min-height:100px; border-radius:10px; padding:10px 12px; cursor:grab; user-select:none; display:flex; flex-direction:column; gap:6px; box-shadow:0 2px 8px rgba(0,0,0,0.10); }
.sticker:active { cursor:grabbing; box-shadow:0 6px 20px rgba(0,0,0,0.18); z-index:10; }
.sticker-text { font-size:13px; line-height:1.5; color:#1a1a18; flex:1; word-break:break-word; white-space:pre-wrap; outline:none; }
.sticker-del { align-self:flex-end; background:rgba(0,0,0,0.1); border:none; border-radius:50%; width:20px; height:20px; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#1a1a18; flex-shrink:0; }
.sticker-colors { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
.scolor { width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.scolor.on { border-color:var(--accent); transform:scale(1.15); }
.add-sticker-btn { width:100%; background:var(--bg2); border:1px dashed var(--border); border-radius:10px; padding:12px; font-size:14px; font-family:inherit; color:var(--text2); cursor:pointer; margin-top:10px; }
</style>
</head>
<body>
<div id="app">
  <div id="screens">

    <!-- HOME -->
    <div class="screen active" id="s-home">
      <div class="greeting">
        <div class="gname" id="gname">Добрый день 👋</div>
        <div class="gdate" id="gdate"></div>
      </div>
      <div class="stats">
        <div class="stat-widget">
          <div class="stat-main">
            <div class="stat-main-n" id="sn">0</div>
            <div class="stat-main-l">заметок</div>
          </div>
          <div class="stat-list">
            <div class="stat-row"><span class="stat-row-l">Задач сегодня</span><span class="stat-row-n" id="st">0</span></div>
            <div class="stat-row"><span class="stat-row-l">Выполнено</span><span class="stat-row-n" id="sd">0</span></div>
            <div class="stat-row"><span class="stat-row-l">Медиа</span><span class="stat-row-n" id="sm">0</span></div>
          </div>
        </div>
      </div>
      <div class="sec-lbl">Задачи на сегодня</div>
      <div class="lst" id="hTasks"></div>
      <div class="sec-lbl">Последние заметки</div>
      <div class="lst" id="hNotes"></div>
    </div>

    <!-- NOTES -->
    <div class="screen" id="s-notes">
      <div class="hdr">
        <div class="hdr-row">
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="hdr-title">Заметки</div>
            <button class="hdr-btn" id="manageBtn" style="padding:4px 10px;font-size:12px;">⚙ Темы</button>
          </div>
          <button class="hdr-btn" id="expBtn">↓ .md</button>
        </div>
        <div class="filters" id="nFilters"></div>
      </div>
      <div class="lst" id="nList"></div>
    </div>

    <!-- CALENDAR -->
    <div class="screen" id="s-calendar">
      <div class="cal-nav">
        <button class="cal-arr" id="cPrev">‹</button>
        <div class="cal-lbl" id="cLbl"></div>
        <button class="cal-arr" id="cNext">›</button>
      </div>
      <div class="cal-wds">
        <div class="cal-wd">Пн</div><div class="cal-wd">Вт</div><div class="cal-wd">Ср</div>
        <div class="cal-wd">Чт</div><div class="cal-wd">Пт</div><div class="cal-wd">Сб</div><div class="cal-wd">Вс</div>
      </div>
      <div class="cal-grid" id="cGrid"></div>
      <div class="cal-day-hdr">
        <div class="cal-dlbl" id="cDlbl"></div>
        <div class="cal-day-btns">
          <button class="hdr-btn" id="cTplBtn">📋 Шаблоны</button>
        </div>
      </div>
      <div id="cAllDay"></div>
      <div class="lst" id="cTasks"></div>
    </div>

    <!-- MEDIA -->
    <div class="screen" id="s-media">
      <div class="hdr">
        <div class="hdr-row"><div class="hdr-title">Медиа</div></div>
        <div class="filters" id="mFilters">

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtShort(iso) {
  var d=new Date(iso),now=new Date();
  if(d.toDateString()===now.toDateString()) return 'Сегодня';
  var y=new Date();y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString()) return 'Вчера';
  return d.toLocaleDateString('ru',{day:'numeric',month:'short'});
}
function fmtFull(iso) { return new Date(iso).toLocaleString('ru',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'}); }
function tagHTML(type) {

// ── Markdown рендер ───────────────────────────────────────
function renderMd(text) {
  var lines = text.split('\n');
  var html = '';
  var inUl = false, inOl = false;
  for (var i=0; i<lines.length; i++) {
    var l = lines[i];
    // close lists if needed
    if (!/^- /.test(l) && inUl) { html += '</ul>'; inUl = false; }
    if (!/^\d+\. /.test(l) && inOl) { html += '</ol>'; inOl = false; }

    if (/^# /.test(l))       { html += '<h1>'+esc(l.slice(2))+'</h1>'; }
    else if (/^## /.test(l)) { html += '<h2>'+esc(l.slice(3))+'</h2>'; }
    else if (/^---$/.test(l.trim())) { html += '<hr>'; }
    else if (/^> /.test(l))  { html += '<blockquote>'+inlineMd(l.slice(2))+'</blockquote>'; }
    else if (/^- /.test(l))  {
      if (!inUl) { html += '<ul>'; inUl = true; }
      html += '<li>'+inlineMd(l.slice(2))+'</li>';
    }
    else if (/^\d+\. /.test(l)) {
      if (!inOl) { html += '<ol>'; inOl = true; }
      html += '<li>'+inlineMd(l.replace(/^\d+\. /,''))+'</li>';
    }
    else if (l.trim() === '') { html += '<br>'; }
    else { html += '<p>'+inlineMd(l)+'</p>'; }
  }
  if (inUl) html += '</ul>';
  if (inOl) html += '</ol>';
  return html;
}
function inlineMd(s) {
  s = esc(s);
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/_(.+?)_/g, '<em>$1</em>');
  return s;
}

var editNoteId=null, viewNoteId=null, selTag='';

function stripMd(s) {
  return s
    .replace(/^#{1,3} /gm, '')
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/_(.+?)_/g, '$1')
    .replace(/^- /gm, '• ')
    .replace(/^\d+\. /gm, '')
    .replace(/^> /gm, '')
    .replace(/^---$/gm, '')
    .trim();
}
function bindNoteSwipe(wrap, refresh) {
  var card=wrap.querySelector('.card'); if(!card)return;
  var id=+wrap.getAttribute('data-id');
  var startX=0,startY=0,dx=0,swiping=false,THRESH=72;
  function onStart(cx,cy){startX=cx;startY=cy;dx=0;swiping=true;}
  function onMove(cx,cy){
    if(!swiping)return;
    var adx=cx-startX,ady=cy-startY;
    if(Math.abs(ady)>Math.abs(adx)+8){swiping=false;card.style.transform='';return;}
    dx=adx;
    card.style.transition='none';
    card.style.transform='translateX('+Math.max(-130,Math.min(130,dx))+'px)';
  }
  function onEnd(){
    if(!swiping)return; swiping=false;
    card.style.transition='';
    if(dx < -THRESH){
      card.style.transform='translateX(-130px)';
      var n=notes.filter(function(x){return x.id===id;})[0];
      if(n&&confirm('Удалить «'+n.title+'»?')){
        notes=notes.filter(function(x){return x.id!==id;});
        save('pn',notes);
        if(refresh) drawNotes(); else drawHome();
      } else { card.style.transform=''; }
    } else if(dx > THRESH){
      card.style.transform='';
      openNoteSheet(id);
    } else { card.style.transform=''; }
  }
  card.addEventListener('touchstart',function(e){var t=e.touches[0];onStart(t.clientX,t.clientY);},{passive:true});
  card.addEventListener('touchmove',function(e){var t=e.touches[0];onMove(t.clientX,t.clientY);},{passive:true});
  card.addEventListener('touchend',onEnd);
  card.addEventListener('mousedown',function(e){onStart(e.clientX,e.clientY);});
  window.addEventListener('mousemove',function(e){if(swiping)onMove(e.clientX,e.clientY);});
  window.addEventListener('mouseup',function(){if(swiping)onEnd();});
}

function noteCard(n) {
  return '<div class="note-swipe-wrap" data-id="'+n.id+'">'
    +'<div class="note-swipe-bg">'
    +'<div class="note-swipe-right">✏ Изменить</div>'
    +'<div class="note-swipe-left">🗑 Удалить</div>'
    +'</div>'
    +'<div class="card" data-id="'+n.id+'">'
    +'<div class="card-top">'+tagHTML(n.type)+'<span class="card-date">'+fmtShort(n.date)+'</span></div>'
    +'<div class="card-title">'+esc(n.title)+'</div>'
    +'<div class="card-body">'+esc(stripMd(n.body))+'</div>'
    +'</div>'
    +'</div>';
}
function drawNotes() {

    bindNoteSwipe(wrap, list===document.getElementById('nList'));

var NOTE_TAB='write'; // 'write' or 'stickers'

function openNoteSheet(id) {
  var n=id?notes.filter(function(x){return x.id===id;})[0]:null;
  editNoteId=id||null;
  selTag=n?n.type:(themes.length?themes[0].id:'note');

function renderNoteSheet(n) {
  var trow='<div class="trow" id="trow">';
  for(var i=0;i<themes.length;i++)
    trow+='<button class="topt'+(selTag===themes[i].id?' on':'')+'" data-tag="'+themes[i].id+'">'+themes[i].emoji+' '+themes[i].name+'</button>';
  trow+='</div>';

  var html='<div class="fld"><div class="fld-lbl">Тема</div>'+trow+'</div>'
    +'<div class="fld"><div class="fld-lbl">Заголовок</div><input type="text" id="fT" placeholder="Название..." value="'+esc(n?n.title:'')+'"></div>'
    +'<div class="fld"><div class="fld-lbl">Текст</div>'
    +'<div class="fmt-bar">'
    +'<button class="fmt-btn" data-fmt="bold"><b>B</b></button>'
    +'<button class="fmt-btn" data-fmt="italic"><i>I</i></button>'
    +'<button class="fmt-btn" data-fmt="h1">H1</button>'
    +'<button class="fmt-btn" data-fmt="h2">H2</button>'
    +'<button class="fmt-btn" data-fmt="ul">• —</button>'
    +'<button class="fmt-btn" data-fmt="ol">1.</button>'
    +'<button class="fmt-btn" data-fmt="hr">—</button>'
    +'<button class="fmt-btn" data-fmt="quote">❝</button>'
    +'</div>'
    +'<div class="note-ta-wrap"><div class="note-ta-bg"></div><div class="note-ta-lines" id="taLines"></div><textarea class="note-ta" id="fB" placeholder="Пиши здесь...">'+esc(n?n.body:'')+'</textarea></div>'
    +'</div>'
    +'<div class="brow" style="margin-top:12px"><button class="bcnl" id="bCnl">Отмена</button><button class="bsave" id="bSave">Сохранить</button></div>';

  openSheet(editNoteId?'Изменить заметку':'Новая заметка', html);
  bindNoteSheet(n);
}

function bindNoteSheet(n) {
  // Темы
  document.getElementById('trow').addEventListener('click',function(e){
    var btn=e.target.closest('.topt'); if(!btn)return;
    selTag=btn.getAttribute('data-tag');
    document.querySelectorAll('#trow .topt').forEach(function(b){b.classList.remove('on');});
    btn.classList.add('on');
  });

  // Форматирование
  document.querySelectorAll('.fmt-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var ta=document.getElementById('fB');
      var start=ta.selectionStart, end=ta.selectionEnd;
      var sel=ta.value.substring(start,end);
      var before=ta.value.substring(0,start), after=ta.value.substring(end);
      var fmt=this.getAttribute('data-fmt');
      var NL='\n';
      var needNl=(start>0 && ta.value[start-1]!=='\n');
      var pre=needNl?NL:'';
      var ins='';
      if(fmt==='bold')  ins='**'+(sel||'текст')+'**';
      if(fmt==='italic')ins='_'+(sel||'текст')+'_';
      if(fmt==='h1')    ins=pre+'# '+(sel||'');
      if(fmt==='h2')    ins=pre+'## '+(sel||'');
      if(fmt==='ul')    ins=pre+'- '+(sel||'Пункт');
      if(fmt==='ol')    ins=pre+'1. '+(sel||'Пункт');
      if(fmt==='hr')    ins=pre+'---';
      if(fmt==='quote') ins=pre+'> '+(sel||'Цитата');
      ta.value=before+ins+after;
      ta.focus();
      ta.selectionStart=ta.selectionEnd=(before+ins).length;
    }.bind(btn));
  });
  // Кнопки
  document.getElementById('bCnl').addEventListener('click',closeSheet);
  document.getElementById('bSave').addEventListener('click',saveNote);

}

function saveNote() {
  var titleEl=document.getElementById('fT'), bodyEl=document.getElementById('fB');
  var title=(titleEl?titleEl.value:'').trim()||'Без заголовка';
  var body=(bodyEl?bodyEl.value:'').trim();
  if(!selTag && themes.length) selTag=themes[0].id;
  if(editNoteId){
    var n=notes.filter(function(x){return x.id===editNoteId;})[0];
    if(n){n.title=title;n.body=body;n.type=selTag;n.date=new Date().toISOString();}
    editNoteId=null;
  } else {
    notes.push({id:Date.now(),type:selTag,title:title,body:body,date:new Date().toISOString()});
  }
  save('pn',notes); closeSheet(); drawNotes(); drawHome();
}

document.getElementById('expBtn').addEventListener('click',function(){

  var TL={};for(var i=0;i<themes.length;i++)TL[themes[i].id]=themes[i].name;

      el.addEventListener('click',function(){
        selSColor=this.getAttribute('data-c');

        this.classList.add('on');

  // Добавить стикер

  if(addBtn){
    addBtn.addEventListener('click',function(){
      var st={id:Date.now(),color:selSColor,text:'',x:20,y:20,noteId:noteId||0};
      stickers.push(st);
      save('p_stickers',stickers);
      renderStickers(board,noteId);
    });
  }
}

function renderStickers(board, noteId) {
  board.innerHTML='';
  var arr=stickers.filter(function(s){return s.noteId===(noteId||0);});
  arr.forEach(function(st){
    var el=document.createElement('div');
    el.className='sticker';
    el.style.cssText='left:'+st.x+'px;top:'+st.y+'px;background:'+st.color+';';
    var del=document.createElement('button');
    del.className='sticker-del';
    del.textContent='✕';
    del.addEventListener('click',function(e){
      e.stopPropagation();
      stickers=stickers.filter(function(s){return s.id!==st.id;});
      save('p_stickers',stickers);
      el.remove();
    });
    var txt=document.createElement('div');
    txt.className='sticker-text';
    txt.contentEditable='true';
    txt.textContent=st.text;
    txt.addEventListener('input',function(){
      st.text=txt.textContent;
      save('p_stickers',stickers);
    });
    el.appendChild(del);
    el.appendChild(txt);
    board.appendChild(el);
    makeDraggable(el,st,board);
  });
}

function makeDraggable(el, st, board) {
  var startX,startY,startLeft,startTop,dragging=false;
  function onStart(cx,cy){
    dragging=true;
    startX=cx; startY=cy;
    startLeft=st.x; startTop=st.y;
    el.style.zIndex=99;
  }
  function onMove(cx,cy){
    if(!dragging)return;
    var dx=cx-startX, dy=cy-startY;
    var bw=board.offsetWidth, bh=board.offsetHeight;
    st.x=Math.max(0,Math.min(bw-el.offsetWidth, startLeft+dx));
    st.y=Math.max(0,Math.min(bh-el.offsetHeight, startTop+dy));
    el.style.left=st.x+'px'; el.style.top=st.y+'px';
  }
  function onEnd(){
    if(!dragging)return;
    dragging=false; el.style.zIndex='';
    save('p_stickers',stickers);
  }
  el.addEventListener('mousedown',function(e){if(e.target.className==='sticker-text'||e.target.className==='sticker-del')return;onStart(e.clientX,e.clientY);});
  window.addEventListener('mousemove',function(e){onMove(e.clientX,e.clientY);});
  window.addEventListener('mouseup',onEnd);
  el.addEventListener('touchstart',function(e){if(e.target.className==='sticker-text'||e.target.className==='sticker-del')return;var t=e.touches[0];onStart(t.clientX,t.clientY);},{passive:true});
  window.addEventListener('touchmove',function(e){if(!dragging)return;var t=e.touches[0];onMove(t.clientX,t.clientY);},{passive:true});
  window.addEventListener('touchend',onEnd);
}

var cY,cM,cSel;
function drawCal() {
  var now=new Date();
  if(cY===undefined){cY=now.getFullYear();cM=now.getMonth();}
  if(!cSel) cSel=today();
  var months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  document.getElementById('cLbl').textContent=months[cM]+' '+cY;
  var first=new Date(cY,cM,1),sd=first.getDay()-1; if(sd<0)sd=6;
  var total=new Date(cY,cM+1,0).getDate(),td=today(),html='';
  for(var i=0;i<sd;i++) html+='<div class="cal-cell" style="pointer-events:none"></div>';
  for(var d=1;d<=total;d++){
    var ds=cY+'-'+pad(cM+1)+'-'+pad(d);
    var hasDot=tasks.some(function(t){return t.date===ds;});
    var cls='cal-cell'+(ds===td?' today':'')+(ds===cSel&&ds!==td?' sel':'')+(hasDot?' dot':'');
    html+='<div class="'+cls+'" data-d="'+ds+'">'+d+'</div>';
  }
  var grid=document.getElementById('cGrid');
  grid.innerHTML=html;
  grid.querySelectorAll('.cal-cell[data-d]').forEach(function(el){
    el.addEventListener('click',function(){cSel=this.getAttribute('data-d');drawCal();}.bind(el));
  });
  drawDayTasks();
}

function drawDayTasks() {
  var d=new Date(cSel+'T12:00:00');
  var lbl=d.toLocaleDateString('ru',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('cDlbl').textContent=lbl[0].toUpperCase()+lbl.slice(1);

  var arr=tasks.filter(function(t){return t.date===cSel;});
  var allDay=arr.filter(function(t){return t.allday;});
  var timed=arr.filter(function(t){return !t.allday;});

  // Sort timed tasks by start time
  timed.sort(function(a,b){
    var at=(a.timeStart||'23:59'), bt=(b.timeStart||'23:59');
    return at<bt?-1:at>bt?1:0;
  });

  // All-day tasks
  var adEl=document.getElementById('cAllDay');
  if(allDay.length){
    var adHtml='<div class="allday-lbl">Весь день</div>';
    allDay.forEach(function(t){
      adHtml+='<div class="task-swipe-wrap" data-id="'+t.id+'">'
        +'<div class="task-swipe-bg"><div class="swipe-right-bg">✏ Изм.</div><div class="swipe-left-bg">🗑 Удал.</div></div>'
        +buildTaskCard(t,true)
        +'</div>';
    });
    adEl.innerHTML=adHtml;
  } else { adEl.innerHTML=''; }

  var ct=document.getElementById('cTasks');
  if(!timed.length && !allDay.length){
    ct.innerHTML='<div class="empty"><div class="etxt">Задач нет. Нажми «＋»</div></div>';
  } else if(!timed.length){
    ct.innerHTML='';
  } else {
    ct.innerHTML='<div style="padding:4px 14px 0;font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;">По времени</div>';
    timed.forEach(function(t){
      ct.innerHTML+='<div class="lst" style="padding:4px 14px;"><div class="task-swipe-wrap" data-id="'+t.id+'">'
        +'<div class="task-swipe-bg"><div class="swipe-right-bg">✏ Изм.</div><div class="swipe-left-bg">🗑 Удал.</div></div>'
        +buildTaskCard(t,false)
        +'</div></div>';
    });
  }

  // Bind interactions
  document.querySelectorAll('.task-swipe-wrap').forEach(bindTaskSwipe);
  document.querySelectorAll('.tc-check').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();toggleTask(+this.getAttribute('data-id'));}.bind(el));
  });

}

function buildTaskCard(t, isAllDay) {
  var color=getColor(t.color||'gray');
  var doneClass=t.done?' done-card':'';
  var alldayClass=isAllDay?' allday':'';
  var timeStr='';
  if(!isAllDay && t.timeStart) {
    timeStr=t.timeStart;
    if(t.timeEnd) timeStr+=' — '+t.timeEnd;
  }
  var metaParts=[];
  if(timeStr) metaParts.push('🕐 '+timeStr);
  var noteLink='';
  if(t.linkedNoteId){
    var ln=notes.filter(function(n){return n.id===t.linkedNoteId;})[0];
    if(ln) noteLink='<div class="tc-note-link">📝 '+esc(ln.title)+'</div>';
  }
  var bgColor=getColor(t.color||'gray');
  return '<div class="task-card'+doneClass+alldayClass+'" data-id="'+t.id+'" style="background:'+bgColor+';">'
    +'<div class="tc-row">'
    +'<div class="tc-check'+(t.done?' done':'')+'" data-id="'+t.id+'">'+(t.done?'✓':'')+'</div>'
    +'<div class="tc-body">'
    +'<div class="tc-title">'+esc(t.title)+'</div>'
    +(metaParts.length?'<div class="tc-meta">'+metaParts.join(' ')+'</div>':'')
    +(t.desc?'<div class="tc-desc">'+esc(t.desc)+'</div>':'')
    +noteLink
    +'</div>'
    +'</div>'
    +'</div>';
}

// Swipe to delete/edit
function bindTaskSwipe(wrap) {
  var card=wrap.querySelector('.task-card'); if(!card)return;
  var id=+wrap.getAttribute('data-id');
  var startX=0,startY=0,dx=0,swiping=false,THRESH=72;

  function onStart(cx,cy){startX=cx;startY=cy;dx=0;swiping=true;}
  function onMove(cx,cy){
    if(!swiping)return;
    var adx=cx-startX, ady=cy-startY;
    if(Math.abs(ady)>Math.abs(adx)+8){swiping=false;card.style.transform='';return;}
    dx=adx;
    card.style.transition='none';
    card.style.transform='translateX('+Math.max(-120,Math.min(120,dx))+'px)';
  }
  function onEnd(){
    if(!swiping)return; swiping=false;
    card.style.transition='';
    if(dx < -THRESH){ // swipe left → delete
      card.style.transform='translateX(-120px)';
      var t=tasks.filter(function(x){return x.id===id;})[0];
      if(t&&confirm('Удалить «'+t.title+'»?')) deleteTask(id);
      else card.style.transform='';
    } else if(dx > THRESH){ // swipe right → edit
      card.style.transform='';
      openTaskSheet(id);
    } else { card.style.transform=''; }
  }

  card.addEventListener('touchstart',function(e){var t=e.touches[0];onStart(t.clientX,t.clientY);},{passive:true});
  card.addEventListener('touchmove',function(e){var t=e.touches[0];onMove(t.clientX,t.clientY);},{passive:true});
  card.addEventListener('touchend',onEnd);
  card.addEventListener('mousedown',function(e){onStart(e.clientX,e.clientY);});
  window.addEventListener('mousemove',function(e){if(swiping)onMove(e.clientX,e.clientY);});
  window.addEventListener('mouseup',function(){if(swiping)onEnd();});
}

        });

    btn.addEventListener('click',function(){
      var id=+this.getAttribute('data-id');
      var tpl=templates.filter(function(x){return x.id===id;})[0]; if(!tpl)return;
      var newTask=Object.assign({},tpl,{id:Date.now(),date:cSel||today(),done:false});
      delete newTask.id; newTask.id=Date.now();
      tasks.push(newTask);
      save('pt',tasks); closeSheet(); drawCal(); drawHome();
    }.bind(btn));
  });
}

function openNewTemplate() {
  var colorPicker='<div class="color-pick" id="cpick">';
  TASK_COLORS.forEach(function(col,i){
    colorPicker+='<div class="cpick'+(i===0?' on':'')+'" data-c="'+col.id+'" style="background:'+col.hex+';"></div>';
  });
  colorPicker+='</div>';
  var selColor=TASK_COLORS[0].id;
  var html='<div class="fld"><div class="fld-lbl">Цвет</div>'+colorPicker+'</div>'
    +'<div class="fld"><div class="fld-lbl">Название</div><input type="text" id="ftTitle" placeholder="Название шаблона..."></div>'
    +'<div class="fld"><div class="fld-lbl">Описание</div><input type="text" id="ftDesc" placeholder="Необязательно..."></div>'
    +'<div class="fld"><div class="fld-lbl">Время начала</div><input type="time" id="ftTimeS"></div>'
    +'<div class="brow"><button class="bcnl" id="bBack">← Назад</button><button class="bsave" id="tplSave">Создать</button></div>';
  openSheet('Новый шаблон', html);
  document.getElementById('cpick').addEventListener('click',function(e){
    var el=e.target.closest('.cpick'); if(!el)return;
    selColor=el.getAttribute('data-c');
    document.querySelectorAll('.cpick').forEach(function(c){c.classList.remove('on');});
    el.classList.add('on');
  });
  document.getElementById('bBack').addEventListener('click',openTemplateManager);
  document.getElementById('tplSave').addEventListener('click',function(){
    var title=(document.getElementById('ftTitle').value||'').trim();
    if(!title){document.getElementById('ftTitle').focus();return;}
    templates.push({id:Date.now(),title:title,color:selColor,
      desc:(document.getElementById('ftDesc').value||'').trim(),
      timeStart:document.getElementById('ftTimeS').value});
    save('p_templates',templates);
    openTemplateManager();
  });
}

// ── МЕДИА ────────────────────────────────────────────────
var mFilter='all',selMType='podcast';
document.getElementById('mFilters').addEventListener('click',function(e){
  var btn=e.target.closest('.fbtn'); if(!btn)return;
  mFilter=btn.getAttribute('data-f');
  document.querySelectorAll('#mFilters .fbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active'); drawMedia();
});
function drawMedia(){
  var list=document.getElementById('mList');
  var arr=mFilter==='all'?media:media.filter(function(m){return m.type===mFilter;});
  if(!arr.length){list.innerHTML='<div class="empty"><div class="eico">🎧</div><div class="etxt">Нет медиа.<br>Нажми «＋»</div></div>';return;}
  list.innerHTML=arr.map(function(m){return'<div class="card"><div class="mrow"><div class="mcover">'+(m.icon||'🎧')+'</div><div class="minfo"><div class="mtitle">'+esc(m.title)+'</div><div class="msub">'+esc(m.sub||'')+'</div></div><span class="tag">'+(m.type==='podcast'?'🎙 Подкаст':'📚 Книга')+'</span></div>'+(m.progress!=null?'<div class="pbar"><div class="pfill" style="width:'+m.progress+'%"></div></div>':'')+'</div>';}).join('');
}
function openMediaSheet(){
  selMType='podcast';
  var html='<div class="fld"><div class="fld-lbl">Тип</div><div class="trow" id="trow"><button class="topt on" data-tag="podcast">🎙 Подкаст</button><button class="topt" data-tag="book">📚 Аудиокнига</button></div></div>'
    +'<div class="fld"><div class="fld-lbl">Название</div><input type="text" id="fT" placeholder="Название..."></div>'
    +'<div class="fld"><div class="fld-lbl">Ссылка</div><input type="text" id="fU" placeholder="https://..."></div>'
    +'<div class="brow"><button class="bcnl" id="bCnl">Отмена</button><button class="bsave" id="bSave">Добавить</button></div>';
  openSheet('Добавить медиа',html);
  document.getElementById('trow').addEventListener('click',function(e){
    var btn=e.target.closest('.topt'); if(!btn)return;
    selMType=btn.getAttribute('data-tag');
    document.querySelectorAll('#trow .topt').forEach(function(b){b.classList.remove('on');}); btn.classList.add('on');
  });
  document.getElementById('bCnl').addEventListener('click',closeSheet);
  document.getElementById('bSave').addEventListener('click',function(){
    var title=(document.getElementById('fT').value||'').trim(); if(!title){document.getElementById('fT').focus();return;}
    var url=(document.getElementById('fU').value||'').trim();
    media.push({id:Date.now(),type:selMType,title:title,sub:url||(selMType==='podcast'?'YouTube':'LibriVox'),icon:selMType==='podcast'?'🎙':'📚',progress:0});
    save('pm',media); closeSheet(); drawMedia(); drawHome();
  });
}

// ── МОДАЛЬНОЕ ОКНО ────────────────────────────────────────
function openSheet(title,bodyHTML){
  document.getElementById('sTitle').textContent=title;
  document.getElementById('sBody').innerHTML=bodyHTML;
  document.getElementById('overlay').classList.add('on');
}
function closeSheet(){document.getElementById('overlay').classList.remove('on');editNoteId=null;}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeSheet();});

// ── СТАРТ ────────────────────────────────────────────────
drawNoteFilters();
drawHome();
</script>
