<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Продуктивность</title>
<!-- Telegram Mini App SDK — это библиотека от Telegram, которая даёт нам доступ к данным пользователя, теме и кнопкам -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #3C3489;
  --accent-light: #EEEDFE;
  --accent-mid: #7F77DD;
  --teal: #1D9E75;
  --teal-light: #E1F5EE;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --coral: #D85A30;
  --coral-light: #FAECE7;
  --bg: #FAFAF8;
  --bg2: #FFFFFF;
  --bg3: #F1EFE8;
  --text: #1a1a18;
  --text2: #888780;
  --text3: #B4B2A9;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --radius: 16px;
  --radius-sm: 10px;
  --nav-h: 64px;
}

/* Telegram присылает цвета своей темы — используем их если есть */
body.tg-dark {
  --bg: #1a1a1f;
  --bg2: #232328;
  --bg3: #2c2c32;
  --text: #f0f0f0;
  --text2: #888888;
  --text3: #555555;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --accent-light: #26215C;
  --teal-light: #04342C;
  --amber-light: #412402;
  --coral-light: #4A1B0C;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Manrope', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

.app {
  height: 100%;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
}

/* ===== НАВИГАЦИЯ ===== */
.nav-bar {
  display: flex;
  border-top: 0.5px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
  padding: 6px 0 max(10px, env(safe-area-inset-bottom));
  order: 2;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  padding: 6px 0;
  border-radius: 8px;
  transition: opacity 0.15s;
  border: none;
  background: none;
  font-family: 'Manrope', sans-serif;
}
.nav-item:active { opacity: 0.6; }
.nav-icon { font-size: 22px; line-height: 1; }
.nav-label { font-size: 10px; color: var(--text2); }
.nav-item.active .nav-label { color: var(--accent); font-weight: 600; }

/* ===== ЭКРАНЫ ===== */
.screens {
  flex: 1;
  overflow: hidden;
  position: relative;
  order: 1;
}
.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
  display: none;
  flex-direction: column;
  padding-bottom: 16px;
}
.screen.active { display: flex; }
.screen::-webkit-scrollbar { display: none; }

/* ===== ШАПКА ===== */
.page-header {
  padding: 20px 20px 12px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.page-title {
  font-family: 'Unbounded', sans-serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.02em;
}
.header-btn {
  background: var(--bg3);
  border: none;
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  font-size: 13px;
  font-family: 'Manrope', sans-serif;
  color: var(--text2);
  cursor: pointer;
}

/* ===== ФИЛЬТРЫ ===== */
.filters {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.filter-btn {
  white-space: nowrap;
  border: 0.5px solid var(--border2);
  background: transparent;
  border-radius: 99px;
  padding: 6px 14px;
  font-size: 13px;
  font-family: 'Manrope', sans-serif;
  color: var(--text2);
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
}
.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ===== КАРТОЧКИ ===== */
.list-wrap { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

.card {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: transform 0.1s;
  animation: fadeUp 0.2s ease both;
}
.card:active { transform: scale(0.98); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.tag {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 99px;
}
.tag-diary   { background: var(--teal-light);  color: #085041; }
.tag-idea    { background: var(--amber-light); color: #412402; }
.tag-summary { background: var(--coral-light); color: #4A1B0C; }
.tag-note    { background: var(--accent-light); color: #26215C; }
.tag-task    { background: var(--accent-light); color: #26215C; }

.card-date { font-size: 12px; color: var(--text3); }
.card-title {
  font-size: 15px; font-weight: 600; color: var(--text);
  margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-preview {
  font-size: 13px; color: var(--text2); line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 15px; line-height: 1.6; }

/* ===== HOME ===== */
.greeting {
  padding: 20px 20px 0;
}
.greeting-name {
  font-family: 'Unbounded', sans-serif;
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
}
.greeting-date { font-size: 13px; color: var(--text2); margin-top: 2px; }

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 14px 16px 0;
}
.stat-card {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
.stat-num { font-size: 24px; font-weight: 500; color: var(--text); }
.stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; }

.section-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 16px 20px 6px;
}

.progress-bar {
  height: 3px;
  background: var(--bg3);
  border-radius: 99px;
  margin-top: 8px;
  overflow: hidden;
}
.progress-fill { height: 100%; border-radius: 99px; background: var(--teal); }

/* ===== ЗАДАЧИ ===== */
.task-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 0.5px solid var(--border);
  cursor: pointer;
}
.task-row:last-child { border-bottom: none; }
.task-check {
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 1.5px solid var(--border2);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  color: #fff;
  margin-top: 2px;
  transition: all 0.15s;
}
.task-check.done { background: var(--teal); border-color: var(--teal); }
.task-text { font-size: 14px; color: var(--text); flex: 1; }
.task-text.done { text-decoration: line-through; color: var(--text3); }

/* ===== КАЛЕНДАРЬ ===== */
.cal-month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 8px;
}
.cal-month-label { font-size: 15px; font-weight: 600; color: var(--text); }
.cal-nav-btn {
  background: var(--bg3); border: none; border-radius: 8px;
  width: 32px; height: 32px; font-size: 16px; cursor: pointer; color: var(--text);
}
.cal-days-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0 12px;
}
.cal-day-name { text-align: center; font-size: 11px; color: var(--text2); padding: 4px 0; font-weight: 600; }
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0 12px 8px;
  gap: 2px;
}
.cal-cell {
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; border-radius: 10px; cursor: pointer;
  color: var(--text2); position: relative;
  transition: background 0.1s;
}
.cal-cell:hover { background: var(--bg3); }
.cal-cell.today { background: var(--accent); color: #fff; font-weight: 600; }
.cal-cell.selected { background: var(--accent-light); color: var(--accent); font-weight: 600; }
.cal-cell.has-task::after {
  content: '';
  position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%; background: var(--teal);
}
.cal-cell.empty { pointer-events: none; }
.cal-selected-day { padding: 8px 20px 4px; font-size: 13px; font-weight: 600; color: var(--text2); }

/* ===== МЕДИА ===== */
.media-cover {
  width: 46px; height: 46px; border-radius: 10px;
  background: var(--bg3); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  border: 0.5px solid var(--border);
}
.media-row { display: flex; gap: 12px; align-items: center; }
.media-info { flex: 1; min-width: 0; }
.media-title { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.media-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* ===== FAB ===== */
.fab {
  position: fixed;
  bottom: calc(var(--nav-h) + 16px);
  right: 50%;
  transform: translateX(50%);
  max-width: 440px;
  width: calc(100% - 40px);
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 15px;
  font-size: 15px;
  font-weight: 600;
  font-family: 'Manrope', sans-serif;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 4px 20px rgba(60,52,137,0.3);
  z-index: 20;
  transition: transform 0.1s;
}
.fab.visible { display: flex; }
.fab:active { transform: translateX(50%) scale(0.97); }

/* ===== МОДАЛЬНОЕ ОКНО ===== */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.overlay.open { opacity: 1; pointer-events: all; }

.sheet {
  background: var(--bg2);
  border-radius: 24px 24px 0 0;
  padding: 16px 20px max(32px, env(safe-area-inset-bottom));
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  transform: translateY(40px);
  transition: transform 0.25s cubic-bezier(0.34,1.2,0.64,1);
  max-height: 92vh;
  overflow-y: auto;
}
.overlay.open .sheet { transform: translateY(0); }

.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 99px;
  margin: 0 auto 18px;
}
.sheet-title {
  font-family: 'Unbounded', sans-serif;
  font-size: 16px; font-weight: 500;
  color: var(--text); margin-bottom: 18px;
}

.field { margin-bottom: 14px; }
.field-label {
  font-size: 11px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;
}

.tag-row { display: flex; gap: 6px; flex-wrap: wrap; }
.tag-opt {
  border: 0.5px solid var(--border2);
  border-radius: 99px;
  padding: 6px 14px;
  font-size: 13px;
  font-family: 'Manrope', sans-serif;
  cursor: pointer;
  background: transparent;
  color: var(--text2);
  transition: all 0.15s;
}
.tag-opt.sel-diary   { background: var(--teal-light);  border-color: var(--teal); color: #085041; }
.tag-opt.sel-idea    { background: var(--amber-light); border-color: var(--amber); color: #412402; }
.tag-opt.sel-summary { background: var(--coral-light); border-color: var(--coral); color: #4A1B0C; }
.tag-opt.sel-note    { background: var(--accent-light); border-color: var(--accent); color: #26215C; }

input[type=text], input[type=date], textarea, select {
  width: 100%;
  background: var(--bg3);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 15px;
  font-family: 'Manrope', sans-serif;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  resize: none;
  -webkit-appearance: none;
}
input[type=text]:focus, input[type=date]:focus, textarea:focus, select:focus {
  border-color: var(--accent-mid);
}
textarea { min-height: 140px; line-height: 1.6; }

.btn-row { display: flex; gap: 10px; margin-top: 18px; }
.btn-cancel {
  flex: 1; background: var(--bg3); border: none;
  border-radius: var(--radius-sm); padding: 14px;
  font-size: 15px; font-family: 'Manrope', sans-serif;
  color: var(--text2); cursor: pointer;
}
.btn-save {
  flex: 2; background: var(--accent); border: none;
  border-radius: var(--radius-sm); padding: 14px;
  font-size: 15px; font-weight: 600; font-family: 'Manrope', sans-serif;
  color: #fff; cursor: pointer;
}

/* ===== ДЕТАЛЬНЫЙ ПРОСМОТР ===== */
.detail {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 50;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  max-width: 480px;
  margin: 0 auto;
}
.detail.open { transform: translateX(0); }
.detail-hdr {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
.back-btn {
  background: var(--bg3); border: none; border-radius: 8px;
  width: 36px; height: 36px; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text); flex-shrink: 0;
}
.detail-edit {
  background: none; border: 0.5px solid var(--border2);
  border-radius: 8px; padding: 6px 14px;
  font-size: 13px; font-family: 'Manrope', sans-serif;
  color: var(--text2); cursor: pointer;
}
.detail-body { flex: 1; overflow-y: auto; padding: 24px 20px; }
.detail-title {
  font-family: 'Unbounded', sans-serif;
  font-size: 20px; font-weight: 500;
  color: var(--text); margin-bottom: 6px; line-height: 1.3;
}
.detail-date { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
.detail-content { font-size: 16px; line-height: 1.8; color: var(--text); white-space: pre-wrap; }
</style>
</head>
<body>

<div class="app">
  <div class="screens">

    <!-- ========== ГЛАВНАЯ ========== -->
    <div class="screen active" id="s-home">
      <div class="greeting">
        <div class="greeting-name" id="greetingName">Добрый день 👋</div>
        <div class="greeting-date" id="greetingDate"></div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" id="statNotes">0</div>
          <div class="stat-label">заметок</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statTasks">0</div>
          <div class="stat-label">задач сегодня</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statDone">0</div>
          <div class="stat-label">выполнено</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statMedia">0</div>
          <div class="stat-label">медиа</div>
        </div>
      </div>
      <div class="section-title">Задачи на сегодня</div>
      <div class="list-wrap" id="homeTasks"></div>
      <div class="section-title">Последние заметки</div>
      <div class="list-wrap" id="homeNotes"></div>
    </div>

    <!-- ========== ЗАМЕТКИ ========== -->
    <div class="screen" id="s-notes">
      <div class="page-header">
        <div class="header-row">
          <div class="page-title">Заметки</div>
          <button class="header-btn" onclick="exportMd()">↓ .md</button>
        </div>
        <div class="filters">
          <button class="filter-btn active" onclick="setNoteFilter('all',this)">Все</button>
          <button class="filter-btn" onclick="setNoteFilter('diary',this)">📔 Дневник</button>
          <button class="filter-btn" onclick="setNoteFilter('idea',this)">💡 Идеи</button>
          <button class="filter-btn" onclick="setNoteFilter('summary',this)">🎧 Конспекты</button>
          <button class="filter-btn" onclick="setNoteFilter('note',this)">📝 Заметки</button>
        </div>
      </div>
      <div class="list-wrap" id="notesList"></div>
    </div>

    <!-- ========== КАЛЕНДАРЬ ========== -->
    <div class="screen" id="s-calendar">
      <div class="cal-month-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month-label" id="calMonthLabel"></div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-days-header">
        <div class="cal-day-name">Пн</div><div class="cal-day-name">Вт</div>
        <div class="cal-day-name">Ср</div><div class="cal-day-name">Чт</div>
        <div class="cal-day-name">Пт</div><div class="cal-day-name">Сб</div>
        <div class="cal-day-name">Вс</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-selected-day" id="calSelectedLabel"></div>
      <div class="list-wrap" id="calTasks"></div>
    </div>

    <!-- ========== МЕДИА ========== -->
    <div class="screen" id="s-media">
      <div class="page-header">
        <div class="header-row">
          <div class="page-title">Медиа</div>
        </div>
        <div class="filters">
          <button class="filter-btn active" onclick="setMediaFilter('all',this)">Все</button>
          <button class="filter-btn" onclick="setMediaFilter('podcast',this)">🎙 Подкасты</button>
          <button class="filter-btn" onclick="setMediaFilter('book',this)">📚 Книги</button>
        </div>
      </div>
      <div class="list-wrap" id="mediaList"></div>
    </div>

  </div>

  <!-- Нижняя навигация -->
  <nav class="nav-bar">
    <button class="nav-item active" id="nav-home" onclick="switchTab('home')">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Главная</div>
    </button>
    <button class="nav-item" id="nav-notes" onclick="switchTab('notes')">
      <div class="nav-icon">📝</div>
      <div class="nav-label">Заметки</div>
    </button>
    <button class="nav-item" id="nav-calendar" onclick="switchTab('calendar')">
      <div class="nav-icon">📅</div>
      <div class="nav-label">Календарь</div>
    </button>
    <button class="nav-item" id="nav-media" onclick="switchTab('media')">
      <div class="nav-icon">🎧</div>
      <div class="nav-label">Медиа</div>
    </button>
  </nav>
</div>

<!-- FAB кнопка -->
<button class="fab" id="fab" onclick="openAdd()">
  <span style="font-size:20px">+</span> <span id="fabLabel">Новая заметка</span>
</button>

<!-- Модальное окно для создания -->
<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">Новая заметка</div>
    <div id="sheetBody"></div>
  </div>
</div>

<!-- Экран детального просмотра -->
<div class="detail" id="detail">
  <div class="detail-hdr">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <span style="flex:1" id="detailTagWrap"></span>
    <button class="detail-edit" onclick="editFromDetail()">Изменить</button>
  </div>
  <div class="detail-body">
    <div class="detail-title" id="detailTitle"></div>
    <div class="detail-date" id="detailDate"></div>
    <div class="detail-content" id="detailContent"></div>
  </div>
</div>

<script>
// ==================== TELEGRAM INIT ====================
// Подключаемся к Telegram — получаем тему и имя пользователя
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand(); // разворачиваем на весь экран
  if (tg.colorScheme === 'dark') document.body.classList.add('tg-dark');
}

// ==================== ДАННЫЕ ====================
// Загружаем сохранённые данные из localStorage
let notes  = JSON.parse(localStorage.getItem('tg_notes')  || '[]');
let tasks  = JSON.parse(localStorage.getItem('tg_tasks')  || '[]');
let media  = JSON.parse(localStorage.getItem('tg_media')  || '[]');

// Если данных нет — добавляем примеры чтобы было не пусто
if (!notes.length && !tasks.length && !media.length) {
  notes = [
    { id: 1, type: 'diary', title: 'Первый день', body: 'Начинаю вести дневник. Сегодня отличный день — попробовал новый подход к планированию.', date: new Date().toISOString() },
    { id: 2, type: 'idea',  title: 'Метод 90-минутных блоков', body: 'Работать блоками по 90 минут без телефона. После — 15 минут отдыха.', date: new Date(Date.now()-86400000).toISOString() },
    { id: 3, type: 'summary', title: 'Huberman Lab — Сон', body: '- Утренний свет 30 минут после пробуждения\n- Кофеин убрать за 10 часов до сна\n- Одинаковое время подъёма каждый день', date: new Date(Date.now()-172800000).toISOString() },
  ];
  tasks = [
    { id: 1, title: 'Послушать подкаст', done: false, date: todayStr() },
    { id: 2, title: 'Записать идеи в дневник', done: true, date: todayStr() },
    { id: 3, title: 'Прочитать главу книги', done: false, date: todayStr() },
  ];
  media = [
    { id: 1, type: 'podcast', title: 'Huberman Lab #112', sub: '2ч 14м · YouTube', icon: '🎙', progress: 62 },
    { id: 2, type: 'book',    title: 'Война и мир', sub: 'Толстой · LibriVox', icon: '📚', progress: 8 },
  ];
  saveAll();
}

function saveAll() {
  localStorage.setItem('tg_notes', JSON.stringify(notes));
  localStorage.setItem('tg_tasks', JSON.stringify(tasks));
  localStorage.setItem('tg_media', JSON.stringify(media));
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

// ==================== ВСПОМОГАТЕЛЬНЫЕ ====================
const tagLabel = { diary:'Дневник', idea:'Идея', summary:'Конспект', note:'Заметка' };
const tagEmoji = { diary:'📔', idea:'💡', summary:'🎧', note:'📝' };

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtDate(iso) {
  const d = new Date(iso), now = new Date();
  const diff = now - d;
  if (diff < 86400000 && now.getDate()===d.getDate())
    return 'Сегодня, ' + d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  if (diff < 172800000) return 'Вчера';
  return d.toLocaleDateString('ru',{day:'numeric',month:'long'});
}

function fmtFullDate(iso) {
  return new Date(iso).toLocaleString('ru',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});
}

// ==================== НАВИГАЦИЯ ====================
let currentTab = 'home';

function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('s-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  currentTab = tab;

  const fab = document.getElementById('fab');
  const fabLabel = document.getElementById('fabLabel');

  if (tab === 'home') {
    fab.classList.remove('visible');
  } else if (tab === 'notes') {
    fab.classList.add('visible');
    fabLabel.textContent = 'Новая заметка';
    renderNotes();
  } else if (tab === 'calendar') {
    fab.classList.add('visible');
    fabLabel.textContent = 'Новая задача';
    renderCalendar();
  } else if (tab === 'media') {
    fab.classList.add('visible');
    fabLabel.textContent = 'Добавить медиа';
    renderMedia();
  }
}

// ==================== ГЛАВНАЯ ====================
function renderHome() {
  // Приветствие с именем из Telegram
  const user = tg?.initDataUnsafe?.user;
  const name = user?.first_name || '';
  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Доброе утро' : hour < 18 ? 'Добрый день' : 'Добрый вечер';
  document.getElementById('greetingName').textContent = greeting + (name ? ', ' + name : '') + ' 👋';

  const days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const now = new Date();
  document.getElementById('greetingDate').textContent =
    days[now.getDay()].charAt(0).toUpperCase() + days[now.getDay()].slice(1) + ', ' +
    now.toLocaleDateString('ru',{day:'numeric',month:'long'});

  // Статистика
  const todayTasks = tasks.filter(t => t.date === todayStr());
  document.getElementById('statNotes').textContent = notes.length;
  document.getElementById('statTasks').textContent = todayTasks.length;
  document.getElementById('statDone').textContent = todayTasks.filter(t=>t.done).length;
  document.getElementById('statMedia').textContent = media.length;

  // Задачи на сегодня
  const ht = document.getElementById('homeTasks');
  if (!todayTasks.length) {
    ht.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">Задач на сегодня нет.<br>Перейди в Календарь чтобы добавить</div></div>';
  } else {
    ht.innerHTML = todayTasks.map(t => `
      <div class="task-row" onclick="toggleTask(${t.id})">
        <div class="task-check ${t.done?'done'}">${t.done?'✓':''}</div>
        <div class="task-text ${t.done?'done'}">${esc(t.title)}</div>
      </div>
    `).join('');
  }

  // Последние 3 заметки
  const hn = document.getElementById('homeNotes');
  const recent = [...notes].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,3);
  if (!recent.length) {
    hn.innerHTML = '<div class="empty-state"><div class="empty-icon">📓</div><div class="empty-text">Заметок нет.<br>Перейди в Заметки чтобы добавить</div></div>';
  } else {
    hn.innerHTML = recent.map(n => noteCard(n)).join('');
  }
}

// ==================== ЗАМЕТКИ ====================
let noteFilter = 'all';
let editingNoteId = null;
let viewingNoteId = null;

function setNoteFilter(f, btn) {
  noteFilter = f;
  document.querySelectorAll('#s-notes .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderNotes();
}

function noteCard(n) {
  return `<div class="card" onclick="openNote(${n.id})">
    <div class="card-top">
      <span class="tag tag-${n.type}">${tagEmoji[n.type]} ${tagLabel[n.type]}</span>
      <span class="card-date">${fmtDate(n.date)}</span>
    </div>
    <div class="card-title">${esc(n.title)}</div>
    <div class="card-preview">${esc(n.body)}</div>
  </div>`;
}

function renderNotes() {
  const list = document.getElementById('notesList');
  const filtered = noteFilter==='all' ? notes : notes.filter(n=>n.type===noteFilter);
  const sorted = [...filtered].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (!sorted.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📓</div><div class="empty-text">Заметок нет.<br>Нажми «+» чтобы добавить</div></div>';
  } else {
    list.innerHTML = sorted.map(noteCard).join('');
  }
}

function openNote(id) {
  viewingNoteId = id;
  const n = notes.find(x=>x.id===id);
  document.getElementById('detailTitle').textContent = n.title;
  document.getElementById('detailDate').textContent = fmtFullDate(n.date);
  document.getElementById('detailContent').textContent = n.body;
  document.getElementById('detailTagWrap').innerHTML = `<span class="tag tag-${n.type}">${tagEmoji[n.type]} ${tagLabel[n.type]}</span>`;
  document.getElementById('detail').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  viewingNoteId = null;
}

function editFromDetail() {
  const id = viewingNoteId;
  closeDetail();
  setTimeout(()=>openEditNote(id), 280);
}

function openEditNote(id) {
  editingNoteId = id;
  const n = notes.find(x=>x.id===id);
  openSheet('Изменить заметку', noteForm(n.type, n.title, n.body));
  selectedNoteTag = n.type;
  highlightTag(n.type);
}

// ==================== ФОРМА ЗАМЕТКИ ====================
let selectedNoteTag = 'note';

function noteForm(type='note', title='', body='') {
  selectedNoteTag = type;
  return `
    <div class="field">
      <div class="field-label">Тип</div>
      <div class="tag-row">
        <button class="tag-opt" onclick="selectNoteTag('note',this)">📝 Заметка</button>
        <button class="tag-opt" onclick="selectNoteTag('diary',this)">📔 Дневник</button>
        <button class="tag-opt" onclick="selectNoteTag('idea',this)">💡 Идея</button>
        <button class="tag-opt" onclick="selectNoteTag('summary',this)">🎧 Конспект</button>
      </div>
    </div>
    <div class="field">
      <div class="field-label">Заголовок</div>
      <input type="text" id="fNoteTitle" value="${esc(title)}" placeholder="Название..." />
    </div>
    <div class="field">
      <div class="field-label">Текст</div>
      <textarea id="fNoteBody" placeholder="Пиши здесь...">${esc(body)}</textarea>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeSheet()">Отмена</button>
      <button class="btn-save" onclick="saveNote()">Сохранить</button>
    </div>
  `;
}

function selectNoteTag(tag, btn) {
  selectedNoteTag = tag;
  document.querySelectorAll('.tag-opt').forEach(b=>b.className='tag-opt');
  btn.classList.add('sel-'+tag);
}

function highlightTag(tag) {
  const opts = document.querySelectorAll('.tag-opt');
  const map = ['note','diary','idea','summary'];
  opts.forEach((b,i)=>{ if(map[i]===tag) b.classList.add('sel-'+tag); });
}

function saveNote() {
  const title = document.getElementById('fNoteTitle')?.value.trim() || 'Без заголовка';
  const body  = document.getElementById('fNoteBody')?.value.trim();
  if (!body) { document.getElementById('fNoteBody')?.focus(); return; }

  if (editingNoteId) {
    const n = notes.find(x=>x.id===editingNoteId);
    Object.assign(n, { title, body, type: selectedNoteTag, date: new Date().toISOString() });
    editingNoteId = null;
  } else {
    notes.push({ id: Date.now(), type: selectedNoteTag, title, body, date: new Date().toISOString() });
  }
  saveAll(); closeSheet(); renderNotes(); renderHome();
}

// ==================== ЭКСПОРТ В MARKDOWN ====================
function exportMd() {
  if (!notes.length) return alert('Нет заметок для экспорта');
  const sorted = [...notes].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const md = sorted.map(n => `# ${n.title}\n\n**Тип:** ${tagLabel[n.type]}  \n**Дата:** ${fmtFullDate(n.date)}\n\n${n.body}\n\n---`).join('\n\n');
  const blob = new Blob([md], {type:'text/markdown'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='заметки.md'; a.click();
  URL.revokeObjectURL(url);
}

// ==================== ЗАДАЧИ ====================
let calYear, calMonth, calSelected;

function toggleTask(id) {
  const t = tasks.find(x=>x.id===id);
  if (t) { t.done = !t.done; saveAll(); renderHome(); renderCalendar(); }
}

// ==================== КАЛЕНДАРЬ ====================
function renderCalendar() {
  const now = new Date();
  if (!calYear) { calYear = now.getFullYear(); calMonth = now.getMonth(); }
  if (!calSelected) calSelected = todayStr();

  const months = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  document.getElementById('calMonthLabel').textContent = months[calMonth] + ' ' + calYear;

  const first = new Date(calYear, calMonth, 1);
  // getDay() возвращает 0=воскресенье, нам нужен понедельник первым
  let startDay = first.getDay() - 1;
  if (startDay < 0) startDay = 6;

  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const todayFull = todayStr();

  let html = '';
  for (let i=0; i<startDay; i++) html += '<div class="cal-cell empty"></div>';
  for (let d=1; d<=daysInMonth; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === todayFull;
    const isSel = ds === calSelected;
    const hasTasks = tasks.some(t=>t.date===ds);
    const cls = [
      'cal-cell',
      isToday ? 'today' : '',
      !isToday && isSel ? 'selected' : '',
      hasTasks ? 'has-task' : ''
    ].filter(Boolean).join(' ');
    html += `<div class="${cls}" onclick="selectDay('${ds}')">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
  renderDayTasks();
}

function selectDay(ds) {
  calSelected = ds;
  renderCalendar();
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth=0; calYear++; }
  if (calMonth < 0)  { calMonth=11; calYear--; }
  renderCalendar();
}

function renderDayTasks() {
  const dayTasks = tasks.filter(t=>t.date===calSelected);
  const d = new Date(calSelected+'T12:00:00');
  document.getElementById('calSelectedLabel').textContent =
    d.toLocaleDateString('ru',{weekday:'long',day:'numeric',month:'long'}).replace(/^./, c=>c.toUpperCase());

  const ct = document.getElementById('calTasks');
  if (!dayTasks.length) {
    ct.innerHTML = '<div class="empty-state" style="padding:30px 20px"><div class="empty-text">Задач нет. Нажми «+» чтобы добавить</div></div>';
  } else {
    ct.innerHTML = dayTasks.map(t=>`
      <div class="card" onclick="toggleTask(${t.id})">
        <div class="card-row" style="display:flex;gap:10px;align-items:center">
          <div class="task-check ${t.done?'done'}">${t.done?'✓':''}</div>
          <div class="task-text ${t.done?'done'}">${esc(t.title)}</div>
        </div>
      </div>
    `).join('');
  }
}

// ==================== ФОРМА ЗАДАЧИ ====================
let editingTaskId = null;

function taskForm(title='', date='') {
  return `
    <div class="field">
      <div class="field-label">Задача</div>
      <input type="text" id="fTaskTitle" value="${esc(title)}" placeholder="Что нужно сделать?" />
    </div>
    <div class="field">
      <div class="field-label">Дата</div>
      <input type="date" id="fTaskDate" value="${date || calSelected || todayStr()}" />
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeSheet()">Отмена</button>
      <button class="btn-save" onclick="saveTask()">Сохранить</button>
    </div>
  `;
}

function saveTask() {
  const title = document.getElementById('fTaskTitle')?.value.trim();
  const date  = document.getElementById('fTaskDate')?.value;
  if (!title) { document.getElementById('fTaskTitle')?.focus(); return; }
  tasks.push({ id: Date.now(), title, done: false, date: date||todayStr() });
  saveAll(); closeSheet(); renderCalendar(); renderHome();
}

// ==================== МЕДИА ====================
let mediaFilter = 'all';

function setMediaFilter(f, btn) {
  mediaFilter = f;
  document.querySelectorAll('#s-media .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMedia();
}

function renderMedia() {
  const list = document.getElementById('mediaList');
  const filtered = mediaFilter==='all' ? media : media.filter(m=>m.type===mediaFilter);
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🎧</div><div class="empty-text">Нет медиа.<br>Нажми «+» чтобы добавить ссылку</div></div>';
    return;
  }
  list.innerHTML = filtered.map(m=>`
    <div class="card">
      <div class="media-row">
        <div class="media-cover">${m.icon||'🎧'}</div>
        <div class="media-info">
          <div class="media-title">${esc(m.title)}</div>
          <div class="media-sub">${esc(m.sub||'')}</div>
        </div>
        <span class="tag ${m.type==='podcast'?'tag-summary':'tag-note'}">${m.type==='podcast'?'Подкаст':'Книга'}</span>
      </div>
      ${m.progress != null ? `<div class="progress-bar" style="margin-top:10px"><div class="progress-fill" style="width:${m.progress}%"></div></div>` : ''}
    </div>
  `).join('');
}

// ==================== ФОРМА МЕДИА ====================
function mediaForm() {
  return `
    <div class="field">
      <div class="field-label">Тип</div>
      <div class="tag-row">
        <button class="tag-opt sel-summary" id="mTypePodcast" onclick="selectMediaType('podcast',this)">🎙 Подкаст</button>
        <button class="tag-opt" id="mTypeBook" onclick="selectMediaType('book',this)">📚 Аудиокнига</button>
      </div>
    </div>
    <div class="field">
      <div class="field-label">Название</div>
      <input type="text" id="fMediaTitle" placeholder="Название подкаста или книги..." />
    </div>
    <div class="field">
      <div class="field-label">Ссылка (YouTube, LibriVox...)</div>
      <input type="text" id="fMediaUrl" placeholder="https://..." />
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeSheet()">Отмена</button>
      <button class="btn-save" onclick="saveMedia()">Добавить</button>
    </div>
  `;
}

let selectedMediaType = 'podcast';

function selectMediaType(type, btn) {
  selectedMediaType = type;
  document.querySelectorAll('#sheet .tag-opt').forEach(b=>b.className='tag-opt');
  btn.classList.add('sel-summary');
}

function saveMedia() {
  const title = document.getElementById('fMediaTitle')?.value.trim();
  if (!title) { document.getElementById('fMediaTitle')?.focus(); return; }
  const url = document.getElementById('fMediaUrl')?.value.trim();
  media.push({
    id: Date.now(),
    type: selectedMediaType,
    title,
    sub: url || (selectedMediaType==='podcast'?'YouTube':'LibriVox'),
    icon: selectedMediaType==='podcast'?'🎙':'📚',
    progress: 0
  });
  saveAll(); closeSheet(); renderMedia(); renderHome();
}

// ==================== МОДАЛЬНЫЙ ЛИСТ ====================
function openSheet(title, bodyHtml) {
  document.getElementById('sheetTitle').textContent = title;
  document.getElementById('sheetBody').innerHTML = bodyHtml;
  document.getElementById('overlay').classList.add('open');
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  editingNoteId = null;
  editingTaskId = null;
  selectedNoteTag = 'note';
  selectedMediaType = 'podcast';
}

function handleOverlay(e) {
  if (e.target === document.getElementById('overlay')) closeSheet();
}

function openAdd() {
  if (currentTab==='notes')    openSheet('Новая заметка', noteForm());
  if (currentTab==='calendar') openSheet('Новая задача', taskForm());
  if (currentTab==='media')    openSheet('Добавить медиа', mediaForm());
  // После открытия листа — подсвечиваем первый тег по умолчанию
  setTimeout(()=>highlightTag(selectedNoteTag), 50);
}

// ==================== СТАРТ ====================
renderHome();
</script>
</body>
</html>
