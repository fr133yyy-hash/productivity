<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Продуктивность</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #3C3489; --accent-light: #EEEDFE;
  --teal: #1D9E75; --teal-light: #E1F5EE;
  --amber-light: #FAEEDA; --coral-light: #FAECE7;
  --bg: #F7F7F5; --bg2: #FFFFFF; --bg3: #EFEFEB;
  --text: #1a1a18; --text2: #888780; --text3: #BBBBBB;
  --border: #E8E8E4; --radius: 14px;
}
html, body { height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:15px; -webkit-font-smoothing:antialiased; overflow:hidden; }
#app { height:100vh; display:flex; flex-direction:column; }
#screens { flex:1; overflow:hidden; position:relative; }
.screen { position:absolute; top:0;left:0;right:0;bottom:0; overflow-y:auto; display:none; flex-direction:column; padding-bottom:20px; }
.screen.active { display:flex; }
#nav { display:flex; background:var(--bg2); border-top:1px solid var(--border); padding:8px 0 12px; flex-shrink:0; }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; background:none; border:none; cursor:pointer; padding:4px 0; font-family:inherit; }
.nav-btn .ico { font-size:24px; line-height:1; }
.nav-btn .lbl { font-size:10px; color:var(--text2); }
.nav-btn.active .lbl { color:var(--accent); font-weight:600; }
.hdr { padding:16px 16px 10px; background:var(--bg); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:5; }
.hdr-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.hdr-title { font-size:20px; font-weight:700; color:var(--text); }
.hdr-btn { background:var(--bg3); border:none; border-radius:8px; padding:6px 12px; font-size:13px; color:var(--text2); cursor:pointer; font-family:inherit; }
.filters { display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; }
.filters::-webkit-scrollbar { display:none; }
.fbtn { white-space:nowrap; flex-shrink:0; border:1px solid var(--border); background:transparent; border-radius:99px; padding:5px 12px; font-size:13px; color:var(--text2); cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:4px; }
.fbtn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.fbtn-add { border-style:dashed; color:var(--text3); }
.lst { padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:13px 14px; cursor:pointer; }
.card:active { opacity:0.75; }
.card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
.card-title { font-size:14px; font-weight:600; color:var(--text); margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-body { font-size:13px; color:var(--text2); line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.card-date { font-size:11px; color:var(--text3); }
.tag { font-size:11px; font-weight:600; padding:2px 9px; border-radius:99px; background:var(--accent-light); color:#26215C; }
.empty { text-align:center; padding:48px 20px; color:var(--text3); }
.empty .eico { font-size:40px; margin-bottom:8px; }
.empty .etxt { font-size:14px; line-height:1.5; }
.greeting { padding:18px 16px 0; }
.gname { font-size:20px; font-weight:700; color:var(--text); }
.gdate { font-size:13px; color:var(--text2); margin-top:2px; }
.stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:12px 14px 0; }
.stat { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:12px; }
.stat-n { font-size:28px; font-weight:700; color:var(--text); line-height:1; }
.stat-l { font-size:12px; color:var(--text2); margin-top:3px; }
.sec-lbl { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; padding:14px 16px 4px; }
.titem { display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); cursor:pointer; }
.titem:last-child { border-bottom:none; }
.tchk { width:20px; height:20px; border-radius:6px; border:1.5px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; color:#fff; margin-top:1px; }
.tchk.done { background:var(--teal); border-color:var(--teal); }
.ttxt { font-size:14px; color:var(--text); flex:1; }
.ttxt.done { text-decoration:line-through; color:var(--text3); }
.pbar { height:3px; background:var(--bg3); border-radius:99px; margin-top:8px; overflow:hidden; }
.pfill { height:100%; border-radius:99px; background:var(--teal); }
.cal-nav { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 8px; }
.cal-lbl { font-size:15px; font-weight:700; color:var(--text); }
.cal-arr { background:var(--bg3); border:none; border-radius:8px; width:32px; height:32px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text); }
.cal-wds { display:grid; grid-template-columns:repeat(7,1fr); padding:0 10px; }
.cal-wd { text-align:center; font-size:11px; font-weight:600; color:var(--text2); padding:3px 0; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); padding:0 10px 8px; gap:2px; }
.cal-cell { aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:13px; border-radius:9px; cursor:pointer; color:var(--text2); position:relative; }
.cal-cell.today { background:var(--accent); color:#fff; font-weight:700; }
.cal-cell.sel:not(.today) { background:var(--accent-light); color:var(--accent); font-weight:600; }
.cal-cell.dot::after { content:''; position:absolute; bottom:3px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:var(--teal); }
.cal-dlbl { padding:6px 16px 2px; font-size:13px; font-weight:600; color:var(--text2); }
.mrow { display:flex; gap:12px; align-items:center; }
.mcover { width:44px; height:44px; border-radius:10px; background:var(--bg3); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.minfo { flex:1; min-width:0; }
.mtitle { font-size:14px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.msub { font-size:12px; color:var(--text2); margin-top:1px; }
#fab { position:fixed; bottom:76px; left:50%; transform:translateX(-50%); width:calc(100% - 28px); max-width:452px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); padding:14px; font-size:15px; font-weight:600; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; box-shadow:0 4px 18px rgba(60,52,137,.28); z-index:30; }
#fab.hide { display:none; }
#overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:100; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .18s; }
#overlay.on { opacity:1; pointer-events:all; }
#sheet { background:var(--bg2); border-radius:20px 20px 0 0; padding:14px 16px 36px; width:100%; transform:translateY(24px); transition:transform .2s; max-height:88vh; overflow-y:auto; }
#overlay.on #sheet { transform:translateY(0); }
.s-handle { width:34px; height:4px; background:var(--border); border-radius:99px; margin:0 auto 14px; }
.s-title { font-size:16px; font-weight:700; color:var(--text); margin-bottom:14px; }
.fld { margin-bottom:12px; }
.fld-lbl { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
input[type=text], input[type=date], textarea { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:11px 12px; font-size:15px; font-family:inherit; color:var(--text); outline:none; resize:none; -webkit-appearance:none; }
input:focus, textarea:focus { border-color:var(--accent); }
textarea { min-height:120px; line-height:1.55; }
.brow { display:flex; gap:8px; margin-top:14px; }
.bcnl { flex:1; background:var(--bg3); border:none; border-radius:10px; padding:13px; font-size:15px; font-family:inherit; color:var(--text2); cursor:pointer; }
.bsave { flex:2; background:var(--accent); border:none; border-radius:10px; padding:13px; font-size:15px; font-weight:600; font-family:inherit; color:#fff; cursor:pointer; }
.bdanger { flex:1; background:#FCEBEB; border:none; border-radius:10px; padding:13px; font-size:15px; font-family:inherit; color:#A32D2D; cursor:pointer; }
#detail { position:fixed; inset:0; background:var(--bg); z-index:50; display:flex; flex-direction:column; transform:translateX(100%); transition:transform .22s; }
#detail.on { transform:translateX(0); }
.d-hdr { display:flex; align-items:center; gap:10px; padding:12px 14px; border-bottom:1px solid var(--border); flex-shrink:0; }
.d-back { background:var(--bg3); border:none; border-radius:8px; width:36px; height:36px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text); }
.d-edit { background:none; border:1px solid var(--border); border-radius:8px; padding:6px 12px; font-size:13px; font-family:inherit; color:var(--text2); cursor:pointer; }
.d-body { flex:1; overflow-y:auto; padding:20px 16px; }
.d-title { font-size:20px; font-weight:700; color:var(--text); margin-bottom:4px; line-height:1.25; }
.d-date { font-size:13px; color:var(--text3); margin-bottom:16px; }
.d-text { font-size:15px; line-height:1.75; color:var(--text); white-space:pre-wrap; }

/* Управление темами */
.theme-list { display:flex; flex-direction:column; gap:6px; margin-bottom:4px; }
.theme-row { display:flex; align-items:center; gap:8px; background:var(--bg3); border-radius:10px; padding:10px 12px; }
.theme-ico { font-size:20px; width:28px; text-align:center; flex-shrink:0; }
.theme-name { flex:1; font-size:14px; font-weight:600; color:var(--text); }
.theme-actions { display:flex; gap:6px; }
.theme-act-btn { background:none; border:1px solid var(--border); border-radius:7px; padding:4px 10px; font-size:12px; font-family:inherit; color:var(--text2); cursor:pointer; }
.theme-act-btn.del { color:#A32D2D; border-color:#F7C1C1; background:#FCEBEB; }

/* Выбор темы в форме заметки */
.trow { display:flex; gap:6px; flex-wrap:wrap; }
.topt { border:1px solid var(--border); border-radius:99px; padding:6px 12px; font-size:13px; font-family:inherit; cursor:pointer; background:transparent; color:var(--text2); display:flex; align-items:center; gap:4px; }
.topt.on { background:var(--accent-light); border-color:var(--accent); color:#26215C; }

/* Выбор эмодзи */
.emoji-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-top:6px; }
.emoji-opt { font-size:22px; text-align:center; padding:6px 0; border-radius:8px; cursor:pointer; border:2px solid transparent; }
.emoji-opt.on { border-color:var(--accent); background:var(--accent-light); }
</style>
</head>
<body>
<div id="app">
  <div id="screens">

    <!-- HOME -->
    <div class="screen active" id="s-home">
      <div class="greeting">
        <div class="gname" id="gname">Добрый день 👋</div>
        <div class="gdate" id="gdate"></div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-n" id="sn">0</div><div class="stat-l">заметок</div></div>
        <div class="stat"><div class="stat-n" id="st">0</div><div class="stat-l">задач сегодня</div></div>
        <div class="stat"><div class="stat-n" id="sd">0</div><div class="stat-l">выполнено</div></div>
        <div class="stat"><div class="stat-n" id="sm">0</div><div class="stat-l">медиа</div></div>
      </div>
      <div class="sec-lbl">Задачи на сегодня</div>
      <div class="lst" id="hTasks"></div>
      <div class="sec-lbl">Последние заметки</div>
      <div class="lst" id="hNotes"></div>
    </div>

    <!-- NOTES -->
    <div class="screen" id="s-notes">
      <div class="hdr">
        <div class="hdr-row">
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="hdr-title">Заметки</div>
            <button class="hdr-btn" id="manageBtn" style="padding:4px 10px;font-size:12px;">⚙ Темы</button>
          </div>
          <button class="hdr-btn" id="expBtn">↓ .md</button>
        </div>
        <div class="filters" id="nFilters"></div>
      </div>
      <div class="lst" id="nList"></div>
    </div>

    <!-- CALENDAR -->
    <div class="screen" id="s-calendar">
      <div class="cal-nav">
        <button class="cal-arr" id="cPrev">‹</button>
        <div class="cal-lbl" id="cLbl"></div>
        <button class="cal-arr" id="cNext">›</button>
      </div>
      <div class="cal-wds">
        <div class="cal-wd">Пн</div><div class="cal-wd">Вт</div><div class="cal-wd">Ср</div>
        <div class="cal-wd">Чт</div><div class="cal-wd">Пт</div><div class="cal-wd">Сб</div><div class="cal-wd">Вс</div>
      </div>
      <div class="cal-grid" id="cGrid"></div>
      <div class="cal-dlbl" id="cDlbl"></div>
      <div class="lst" id="cTasks"></div>
    </div>

    <!-- MEDIA -->
    <div class="screen" id="s-media">
      <div class="hdr">
        <div class="hdr-row"><div class="hdr-title">Медиа</div></div>
        <div class="filters" id="mFilters">
          <button class="fbtn active" data-f="all">Все</button>
          <button class="fbtn" data-f="podcast">🎙 Подкасты</button>
          <button class="fbtn" data-f="book">📚 Книги</button>
        </div>
      </div>
      <div class="lst" id="mList"></div>
    </div>

  </div>
  <nav id="nav">
    <button class="nav-btn active" data-tab="home"><div class="ico">🏠</div><div class="lbl">Главная</div></button>
    <button class="nav-btn" data-tab="notes"><div class="ico">📝</div><div class="lbl">Заметки</div></button>
    <button class="nav-btn" data-tab="calendar"><div class="ico">📅</div><div class="lbl">Календарь</div></button>
    <button class="nav-btn" data-tab="media"><div class="ico">🎧</div><div class="lbl">Медиа</div></button>
  </nav>
</div>

<button id="fab" class="hide">＋ <span id="fabLbl">Добавить</span></button>

<div id="overlay">
  <div id="sheet">
    <div class="s-handle"></div>
    <div class="s-title" id="sTitle"></div>
    <div id="sBody"></div>
  </div>
</div>

<div id="detail">
  <div class="d-hdr">
    <button class="d-back" id="dBack">←</button>
    <span style="flex:1" id="dTag"></span>
    <button class="d-edit" id="dEdit">Изменить</button>
  </div>
  <div class="d-body">
    <div class="d-title" id="dTitle"></div>
    <div class="d-date" id="dDate"></div>
    <div class="d-text" id="dText"></div>
  </div>
</div>

<script>
var tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

function load(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } }
function save(k,v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

// === ТЕМЫ ===
// Каждая тема: { id, emoji, name }
var DEFAULT_THEMES = [
  { id:'diary',   emoji:'📔', name:'Дневник' },
  { id:'idea',    emoji:'💡', name:'Идеи' },
  { id:'summary', emoji:'🎧', name:'Конспекты' },
  { id:'note',    emoji:'📝', name:'Заметки' },
];
var themes = load('p_themes') || DEFAULT_THEMES.slice();

function saveThemes() { save('p_themes', themes); }
function findTheme(id) {
  for (var i=0;i<themes.length;i++) if (themes[i].id===id) return themes[i];
  return null;
}

// === ДАННЫЕ ===
var notes = load('pn') || [];
var tasks = load('pt') || [];
var media = load('pm') || [];

function today() {
  var d = new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function pad(n) { return n<10?'0'+n:''+n; }

if (!notes.length) {
  notes = [
    {id:1,type:'diary',  title:'Первый день',       body:'Начинаю вести дневник. Системы важнее целей.',                                                    date:new Date().toISOString()},
    {id:2,type:'idea',   title:'90-минутные блоки',  body:'Работать блоками по 90 мин без телефона. После каждого — 15 мин отдыха.',                        date:new Date(Date.now()-86400000).toISOString()},
    {id:3,type:'summary',title:'Huberman Lab — Сон', body:'- Утренний свет 30 мин\n- Кофеин убрать за 10 ч до сна\n- Одинаковый режим каждый день',        date:new Date(Date.now()-172800000).toISOString()},
  ];
  save('pn', notes);
}
if (!tasks.length) {
  tasks=[{id:1,title:'Послушать подкаст',done:false,date:today()},{id:2,title:'Записать идеи',done:true,date:today()},{id:3,title:'Прочитать главу',done:false,date:today()}];
  save('pt', tasks);
}
if (!media.length) {
  media=[{id:1,type:'podcast',title:'Huberman Lab #112',sub:'YouTube · 2ч 14м',icon:'🎙',progress:62},{id:2,type:'book',title:'Война и мир',sub:'LibriVox · Толстой',icon:'📚',progress:8}];
  save('pm', media);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtShort(iso) {
  var d=new Date(iso),now=new Date();
  if (d.toDateString()===now.toDateString()) return 'Сегодня';
  var y=new Date();y.setDate(y.getDate()-1);
  if (d.toDateString()===y.toDateString()) return 'Вчера';
  return d.toLocaleDateString('ru',{day:'numeric',month:'short'});
}
function fmtFull(iso) { return new Date(iso).toLocaleString('ru',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'}); }

function tagHTML(typeId) {
  var t = findTheme(typeId);
  if (!t) return '<span class="tag">❓ Неизвестно</span>';
  return '<span class="tag">'+t.emoji+' '+t.name+'</span>';
}

// === НАВИГАЦИЯ ===
var curTab = 'home';
var navBtns = document.querySelectorAll('.nav-btn');
for (var i=0;i<navBtns.length;i++) {
  navBtns[i].addEventListener('click', (function(btn){ return function(){ goTab(btn.getAttribute('data-tab')); }; })(navBtns[i]));
}
function goTab(tab) {
  curTab=tab;
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('s-'+tab).classList.add('active');
  document.querySelector('.nav-btn[data-tab="'+tab+'"]').classList.add('active');
  var fab=document.getElementById('fab'), fabLbl=document.getElementById('fabLbl');
  if (tab==='home')     { fab.classList.add('hide'); drawHome(); }
  if (tab==='notes')    { fab.classList.remove('hide'); fabLbl.textContent='Новая заметка'; drawNoteFilters(); drawNotes(); }
  if (tab==='calendar') { fab.classList.remove('hide'); fabLbl.textContent='Новая задача'; drawCal(); }
  if (tab==='media')    { fab.classList.remove('hide'); fabLbl.textContent='Добавить медиа'; drawMedia(); }
}
document.getElementById('fab').addEventListener('click', function(){
  if (curTab==='notes')    openNoteSheet(null);
  if (curTab==='calendar') openTaskSheet();
  if (curTab==='media')    openMediaSheet();
});

// === ГЛАВНАЯ ===
function drawHome() {
  var user=tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user, name=user?user.first_name:'';
  var h=new Date().getHours(), gr=h<12?'Доброе утро':h<18?'Добрый день':'Добрый вечер';
  document.getElementById('gname').textContent=gr+(name?', '+name:'')+' 👋';
  var now=new Date(), days=['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'], dn=days[now.getDay()];
  document.getElementById('gdate').textContent=dn[0].toUpperCase()+dn.slice(1)+', '+now.toLocaleDateString('ru',{day:'numeric',month:'long'});
  var td=tasks.filter(function(t){return t.date===today();});
  document.getElementById('sn').textContent=notes.length;
  document.getElementById('st').textContent=td.length;
  document.getElementById('sd').textContent=td.filter(function(t){return t.done;}).length;
  document.getElementById('sm').textContent=media.length;
  var ht=document.getElementById('hTasks');
  if (!td.length) { ht.innerHTML='<div class="empty"><div class="eico">✅</div><div class="etxt">Задач нет.<br>Перейди в Календарь</div></div>'; }
  else {
    var html='<div class="card">';
    for (var i=0;i<td.length;i++) html+='<div class="titem" data-id="'+td[i].id+'"><div class="tchk'+(td[i].done?' done':'')+'>'+(td[i].done?'✓':'')+'</div><div class="ttxt'+(td[i].done?' done':'')+'">'+esc(td[i].title)+'</div></div>';
    ht.innerHTML=html+'</div>';
    ht.querySelectorAll('.titem').forEach(function(el){el.addEventListener('click',function(){toggleTask(+this.getAttribute('data-id'));}.bind(el));});
  }
  var hn=document.getElementById('hNotes');
  var recent=notes.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);}).slice(0,3);
  if (!recent.length) { hn.innerHTML='<div class="empty"><div class="eico">📓</div><div class="etxt">Заметок нет</div></div>'; }
  else {
    hn.innerHTML=recent.map(noteCard).join('');
    hn.querySelectorAll('.card[data-id]').forEach(function(el){el.addEventListener('click',function(){openNote(+this.getAttribute('data-id'));}.bind(el));});
  }
}

// === ФИЛЬТРЫ ЗАМЕТОК ===
var nFilter='all';

function drawNoteFilters() {
  var wrap=document.getElementById('nFilters');
  var html='<button class="fbtn'+(nFilter==='all'?' active':'')+'" data-f="all">Все</button>';
  for (var i=0;i<themes.length;i++) {
    html+='<button class="fbtn'+(nFilter===themes[i].id?' active':'')+'" data-f="'+themes[i].id+'">'+themes[i].emoji+' '+themes[i].name+'</button>';
  }
  wrap.innerHTML=html;
  wrap.querySelectorAll('.fbtn').forEach(function(btn){
    btn.addEventListener('click',function(){
      nFilter=this.getAttribute('data-f');
      wrap.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
      this.classList.add('active');
      drawNotes();
    }.bind(btn));
  });
}

// === ЗАМЕТКИ ===
var editNoteId=null, viewNoteId=null, selTag='';

function noteCard(n) {
  return '<div class="card" data-id="'+n.id+'"><div class="card-top">'+tagHTML(n.type)+'<span class="card-date">'+fmtShort(n.date)+'</span></div><div class="card-title">'+esc(n.title)+'</div><div class="card-body">'+esc(n.body)+'</div></div>';
}
function drawNotes() {
  var list=document.getElementById('nList');
  var arr=nFilter==='all'?notes:notes.filter(function(n){return n.type===nFilter;});
  arr=arr.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  if (!arr.length) { list.innerHTML='<div class="empty"><div class="eico">📓</div><div class="etxt">Заметок нет.<br>Нажми «＋» чтобы добавить</div></div>'; return; }
  list.innerHTML=arr.map(noteCard).join('');
  list.querySelectorAll('.card[data-id]').forEach(function(el){el.addEventListener('click',function(){openNote(+this.getAttribute('data-id'));}.bind(el));});
}

function openNote(id) {
  viewNoteId=id;
  var n=notes.filter(function(x){return x.id===id;})[0]; if(!n)return;
  document.getElementById('dTitle').textContent=n.title;
  document.getElementById('dDate').textContent=fmtFull(n.date);
  document.getElementById('dText').textContent=n.body;
  document.getElementById('dTag').innerHTML=tagHTML(n.type);
  document.getElementById('detail').classList.add('on');
}
document.getElementById('dBack').addEventListener('click',function(){document.getElementById('detail').classList.remove('on');viewNoteId=null;});
document.getElementById('dEdit').addEventListener('click',function(){var id=viewNoteId;document.getElementById('detail').classList.remove('on');setTimeout(function(){openNoteSheet(id);},230);});

function openNoteSheet(id) {
  var n=id?notes.filter(function(x){return x.id===id;})[0]:null;
  editNoteId=id||null;
  selTag=n?n.type:(themes.length?themes[0].id:'note');
  var trow='<div class="trow" id="trow">';
  for (var i=0;i<themes.length;i++) {
    trow+='<button class="topt'+(selTag===themes[i].id?' on':'')+'" data-tag="'+themes[i].id+'">'+themes[i].emoji+' '+themes[i].name+'</button>';
  }
  trow+='</div>';
  var html='<div class="fld"><div class="fld-lbl">Тема</div>'+trow+'</div>'
    +'<div class="fld"><div class="fld-lbl">Заголовок</div><input type="text" id="fT" placeholder="Название..." value="'+esc(n?n.title:'')+'"></div>'
    +'<div class="fld"><div class="fld-lbl">Текст</div><textarea id="fB" placeholder="Пиши здесь...">'+esc(n?n.body:'')+'</textarea></div>'
    +'<div class="brow"><button class="bcnl" id="bCnl">Отмена</button><button class="bsave" id="bSave">Сохранить</button></div>';
  openSheet(id?'Изменить заметку':'Новая заметка', html);
  document.getElementById('trow').addEventListener('click',function(e){
    var btn=e.target.closest('.topt'); if(!btn)return;
    selTag=btn.getAttribute('data-tag');
    document.querySelectorAll('#trow .topt').forEach(function(b){b.classList.remove('on');});
    btn.classList.add('on');
  });
  document.getElementById('bCnl').addEventListener('click',closeSheet);
  document.getElementById('bSave').addEventListener('click',saveNote);
}

function saveNote() {
  var title=(document.getElementById('fT').value||'').trim()||'Без заголовка';
  var body=(document.getElementById('fB').value||'').trim();
  if (!body){document.getElementById('fB').focus();return;}
  if (!selTag && themes.length) selTag=themes[0].id;
  if (editNoteId) {
    var n=notes.filter(function(x){return x.id===editNoteId;})[0];
    if(n){n.title=title;n.body=body;n.type=selTag;n.date=new Date().toISOString();}
    editNoteId=null;
  } else {
    notes.push({id:Date.now(),type:selTag,title:title,body:body,date:new Date().toISOString()});
  }
  save('pn',notes); closeSheet(); drawNotes(); drawHome();
}

document.getElementById('expBtn').addEventListener('click',function(){
  if(!notes.length){alert('Нет заметок');return;}
  var TL={};for(var i=0;i<themes.length;i++)TL[themes[i].id]=themes[i].name;
  var md=notes.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);})
    .map(function(n){return'# '+n.title+'\n\n**Тема:** '+(TL[n.type]||n.type)+'  \n**Дата:** '+fmtFull(n.date)+'\n\n'+n.body+'\n\n---';}).join('\n\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([md],{type:'text/markdown'}));a.download='заметки.md';a.click();
});

// === УПРАВЛЕНИЕ ТЕМАМИ ===
document.getElementById('manageBtn').addEventListener('click', openThemeManager);

function openThemeManager() {
  openSheet('Темы', buildThemeManagerHTML());
  bindThemeManagerEvents();
}

function buildThemeManagerHTML() {
  var html='<div class="theme-list" id="themeList">';
  for (var i=0;i<themes.length;i++) {
    var t=themes[i];
    html+='<div class="theme-row" data-id="'+t.id+'">'
      +'<div class="theme-ico">'+t.emoji+'</div>'
      +'<div class="theme-name">'+esc(t.name)+'</div>'
      +'<div class="theme-actions">'
      +'<button class="theme-act-btn edit-theme" data-id="'+t.id+'">✏ Изменить</button>'
      +'<button class="theme-act-btn del delete-theme" data-id="'+t.id+'">✕</button>'
      +'</div>'
      +'</div>';
  }
  html+='</div>'
    +'<div class="brow" style="margin-top:8px;">'
    +'<button class="bcnl" id="bCnl">Закрыть</button>'
    +'<button class="bsave" id="bAddTheme">＋ Новая тема</button>'
    +'</div>';
  return html;
}

function bindThemeManagerEvents() {
  document.getElementById('bCnl').addEventListener('click', closeSheet);
  document.getElementById('bAddTheme').addEventListener('click', function(){ openThemeSheet(null); });
  document.querySelectorAll('.edit-theme').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id=this.getAttribute('data-id');
      openThemeSheet(id);
    }.bind(btn));
  });
  document.querySelectorAll('.delete-theme').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id=this.getAttribute('data-id');
      var t=findTheme(id);
      if (!t) return;
      // Заметки с этой темой переводим в первую оставшуюся или удаляем тему
      var count=notes.filter(function(n){return n.type===id;}).length;
      var msg='Удалить тему «'+t.emoji+' '+t.name+'»?';
      if (count>0) msg+='\n\n'+count+' заметок потеряют тему.';
      if (!confirm(msg)) return;
      themes=themes.filter(function(x){return x.id!==id;});
      saveThemes();
      // Если текущий фильтр — удалённая тема, сбрасываем
      if (nFilter===id) nFilter='all';
      // Перерисовываем менеджер внутри того же листа
      document.getElementById('sBody').innerHTML=buildThemeManagerHTML();
      bindThemeManagerEvents();
    }.bind(btn));
  });
}

// Список эмодзи для выбора
var EMOJIS = ['📔','💡','🎧','📝','🎯','🔥','⭐','💼','🏋️','📚','🎨','🌿','💊','🧠','✈️','🎵','💰','🧘','📸','🍀','🔬','🛠','🌙','☀️','❤️','🚀'];
var selEmoji = '📝';

function openThemeSheet(id) {
  var t = id ? findTheme(id) : null;
  selEmoji = t ? t.emoji : EMOJIS[0];
  var emojiGrid='<div class="emoji-grid" id="emojiGrid">';
  for (var i=0;i<EMOJIS.length;i++) {
    emojiGrid+='<div class="emoji-opt'+(EMOJIS[i]===selEmoji?' on':'')+'" data-e="'+EMOJIS[i]+'">'+EMOJIS[i]+'</div>';
  }
  emojiGrid+='</div>';
  var html='<div class="fld"><div class="fld-lbl">Иконка</div>'+emojiGrid+'</div>'
    +'<div class="fld"><div class="fld-lbl">Название</div><input type="text" id="fTName" placeholder="Название темы..." value="'+esc(t?t.name:'')+'"></div>'
    +'<div class="brow">'
    +(id?'<button class="bcnl" id="bBack">← Назад</button>':'<button class="bcnl" id="bCnl">Отмена</button>')
    +'<button class="bsave" id="bSaveTheme">'+(id?'Сохранить':'Создать')+'</button>'
    +'</div>';
  openSheet(id?'Изменить тему':'Новая тема', html);

  document.getElementById('emojiGrid').addEventListener('click',function(e){
    var opt=e.target.closest('.emoji-opt'); if(!opt)return;
    selEmoji=opt.getAttribute('data-e');
    document.querySelectorAll('.emoji-opt').forEach(function(o){o.classList.remove('on');});
    opt.classList.add('on');
  });

  var backBtn=document.getElementById('bBack')||document.getElementById('bCnl');
  backBtn.addEventListener('click', function(){
    if (id) { openSheet('Темы', buildThemeManagerHTML()); bindThemeManagerEvents(); }
    else closeSheet();
  });

  document.getElementById('bSaveTheme').addEventListener('click', function(){
    var name=(document.getElementById('fTName').value||'').trim();
    if (!name) { document.getElementById('fTName').focus(); return; }
    if (id) {
      var t2=findTheme(id); if(t2){t2.emoji=selEmoji;t2.name=name;}
    } else {
      // Генерируем уникальный id
      var newId='theme_'+Date.now();
      themes.push({id:newId, emoji:selEmoji, name:name});
    }
    saveThemes();
    openSheet('Темы', buildThemeManagerHTML());
    bindThemeManagerEvents();
  });
}

// === ЗАДАЧИ ===
function toggleTask(id) {
  var t=tasks.filter(function(x){return x.id===id;})[0]; if(!t)return;
  t.done=!t.done; save('pt',tasks); drawHome();
  if (curTab==='calendar') drawDayTasks();
}

// === КАЛЕНДАРЬ ===
var cY,cM,cSel;
function drawCal() {
  var now=new Date();
  if(cY===undefined){cY=now.getFullYear();cM=now.getMonth();}
  if(!cSel)cSel=today();
  var months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  document.getElementById('cLbl').textContent=months[cM]+' '+cY;
  var first=new Date(cY,cM,1), sd=first.getDay()-1; if(sd<0)sd=6;
  var total=new Date(cY,cM+1,0).getDate(), td=today(), html='';
  for(var i=0;i<sd;i++)html+='<div class="cal-cell" style="pointer-events:none"></div>';
  for(var d=1;d<=total;d++){
    var ds=cY+'-'+pad(cM+1)+'-'+pad(d);
    var hasDot=tasks.some(function(t){return t.date===ds;});
    var cls='cal-cell'+(ds===td?' today':'')+(ds===cSel&&ds!==td?' sel':'')+(hasDot?' dot':'');
    html+='<div class="'+cls+'" data-d="'+ds+'">'+d+'</div>';
  }
  var grid=document.getElementById('cGrid');
  grid.innerHTML=html;
  grid.querySelectorAll('.cal-cell[data-d]').forEach(function(el){el.addEventListener('click',function(){cSel=this.getAttribute('data-d');drawCal();}.bind(el));});
  drawDayTasks();
}
function drawDayTasks() {
  var d=new Date(cSel+'T12:00:00');
  var lbl=d.toLocaleDateString('ru',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('cDlbl').textContent=lbl[0].toUpperCase()+lbl.slice(1);
  var arr=tasks.filter(function(t){return t.date===cSel;}), ct=document.getElementById('cTasks');
  if(!arr.length){ct.innerHTML='<div class="empty"><div class="etxt">Задач нет. Нажми «＋»</div></div>';return;}
  var html='<div class="card">';
  for(var i=0;i<arr.length;i++) html+='<div class="titem" data-id="'+arr[i].id+'"><div class="tchk'+(arr[i].done?' done':'')+'>'+(arr[i].done?'✓':'')+'</div><div class="ttxt'+(arr[i].done?' done':'')+'">'+esc(arr[i].title)+'</div></div>';
  ct.innerHTML=html+'</div>';
  ct.querySelectorAll('.titem').forEach(function(el){el.addEventListener('click',function(){toggleTask(+this.getAttribute('data-id'));drawDayTasks();}.bind(el));});
}
document.getElementById('cPrev').addEventListener('click',function(){cM--;if(cM<0){cM=11;cY--;}drawCal();});
document.getElementById('cNext').addEventListener('click',function(){cM++;if(cM>11){cM=0;cY++;}drawCal();});

function openTaskSheet() {
  var html='<div class="fld"><div class="fld-lbl">Задача</div><input type="text" id="fT" placeholder="Что нужно сделать?"></div>'
    +'<div class="fld"><div class="fld-lbl">Дата</div><input type="date" id="fD" value="'+(cSel||today())+'"></div>'
    +'<div class="brow"><button class="bcnl" id="bCnl">Отмена</button><button class="bsave" id="bSave">Сохранить</button></div>';
  openSheet('Новая задача', html);
  document.getElementById('bCnl').addEventListener('click',closeSheet);
  document.getElementById('bSave').addEventListener('click',function(){
    var title=(document.getElementById('fT').value||'').trim(), date=document.getElementById('fD').value||today();
    if(!title){document.getElementById('fT').focus();return;}
    tasks.push({id:Date.now(),title:title,done:false,date:date});
    save('pt',tasks); closeSheet(); drawCal(); drawHome();
  });
}

// === МЕДИА ===
var mFilter='all', selMType='podcast';
document.getElementById('mFilters').addEventListener('click',function(e){
  var btn=e.target.closest('.fbtn'); if(!btn)return;
  mFilter=btn.getAttribute('data-f');
  document.querySelectorAll('#mFilters .fbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active'); drawMedia();
});
function drawMedia() {
  var list=document.getElementById('mList');
  var arr=mFilter==='all'?media:media.filter(function(m){return m.type===mFilter;});
  if(!arr.length){list.innerHTML='<div class="empty"><div class="eico">🎧</div><div class="etxt">Нет медиа.<br>Нажми «＋»</div></div>';return;}
  list.innerHTML=arr.map(function(m){return'<div class="card"><div class="mrow"><div class="mcover">'+(m.icon||'🎧')+'</div><div class="minfo"><div class="mtitle">'+esc(m.title)+'</div><div class="msub">'+esc(m.sub||'')+'</div></div><span class="tag">'+(m.type==='podcast'?'🎙 Подкаст':'📚 Книга')+'</span></div>'+(m.progress!=null?'<div class="pbar"><div class="pfill" style="width:'+m.progress+'%"></div></div>':'')+'</div>';}).join('');
}
function openMediaSheet() {
  selMType='podcast';
  var html='<div class="fld"><div class="fld-lbl">Тип</div><div class="trow" id="trow"><button class="topt on" data-tag="podcast">🎙 Подкаст</button><button class="topt" data-tag="book">📚 Аудиокнига</button></div></div>'
    +'<div class="fld"><div class="fld-lbl">Название</div><input type="text" id="fT" placeholder="Название..."></div>'
    +'<div class="fld"><div class="fld-lbl">Ссылка</div><input type="text" id="fU" placeholder="https://..."></div>'
    +'<div class="brow"><button class="bcnl" id="bCnl">Отмена</button><button class="bsave" id="bSave">Добавить</button></div>';
  openSheet('Добавить медиа', html);
  document.getElementById('trow').addEventListener('click',function(e){
    var btn=e.target.closest('.topt'); if(!btn)return;
    selMType=btn.getAttribute('data-tag');
    document.querySelectorAll('#trow .topt').forEach(function(b){b.classList.remove('on');}); btn.classList.add('on');
  });
  document.getElementById('bCnl').addEventListener('click',closeSheet);
  document.getElementById('bSave').addEventListener('click',function(){
    var title=(document.getElementById('fT').value||'').trim(); if(!title){document.getElementById('fT').focus();return;}
    var url=(document.getElementById('fU').value||'').trim();
    media.push({id:Date.now(),type:selMType,title:title,sub:url||(selMType==='podcast'?'YouTube':'LibriVox'),icon:selMType==='podcast'?'🎙':'📚',progress:0});
    save('pm',media); closeSheet(); drawMedia(); drawHome();
  });
}

// === МОДАЛЬНОЕ ОКНО ===
function openSheet(title, bodyHTML) {
  document.getElementById('sTitle').textContent=title;
  document.getElementById('sBody').innerHTML=bodyHTML;
  document.getElementById('overlay').classList.add('on');
}
function closeSheet() { document.getElementById('overlay').classList.remove('on'); editNoteId=null; }
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeSheet();});

// === СТАРТ ===
drawNoteFilters();
drawHome();
</script>
